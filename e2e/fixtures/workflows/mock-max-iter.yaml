name: e2e-mock-max-iter
description: Workflow with max_steps=2 that loops between two steps
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
personas:
  test-coder: |
    You are the E2E test coder.
max_steps: 2
initial_step: step-a
steps:
  - name: step-a
    edit: true
    persona: test-coder
    required_permission_mode: edit
    instruction: |
      {task}
    rules:
      - condition: Done
        next: step-b
  - name: step-b
    edit: true
    persona: test-coder
    required_permission_mode: edit
    instruction: |
      Continue the task.
    rules:
      - condition: Done
        next: step-a
