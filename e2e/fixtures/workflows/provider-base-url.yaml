name: e2e-provider-base-url
description: Provider base_url propagation fixture for CLI E2E
workflow_config:
  provider_options:
    codex:
      base_url: http://127.0.0.1:8787/v1
      network_access: true
    claude:
      base_url: http://localhost:8787
personas:
  test-coder: |
    You are the E2E test coder.
max_steps: 3
steps:
  - name: execute
    edit: true
    persona: test-coder
    provider_options:
      claude:
        base_url: http://127.0.0.1:8788
        allowed_tools:
          - Read
          - Write
          - Edit
    required_permission_mode: edit
    instruction: |
      {task}
    rules:
      - condition: Done
        next: COMPLETE
