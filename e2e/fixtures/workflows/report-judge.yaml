name: e2e-report-judge
description: E2E workflow that exercises report + judge phases
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
personas:
  test-reporter: |
    You are the E2E test reporter.
max_steps: 3
steps:
  - name: execute
    edit: true
    persona: ./agents/test-reporter.md
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Write
          - Edit
    required_permission_mode: edit
    output_contracts:
      report:
        - name: report.md
          format: report
    instruction: |
      {task}
    rules:
      - condition: Done
        next: COMPLETE
      - condition: Needs fix
        next: ABORT
