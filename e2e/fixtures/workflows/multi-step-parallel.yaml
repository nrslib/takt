name: e2e-multi-step-parallel
description: Multi-step workflow with parallel substeps for E2E testing
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
personas:
  test-coder: |
    You are the E2E test coder.
  test-reviewer-a: |
    You are reviewer A for E2E testing.
  test-reviewer-b: |
    You are reviewer B for E2E testing.
max_steps: 10
initial_step: plan
steps:
  - name: plan
    persona: ./agents/test-coder.md
    edit: true
    required_permission_mode: edit
    instruction: |
      Create a plan for the task.
    rules:
      - condition: Plan complete
        next: review
  - name: review
    parallel:
      - name: arch-review
        persona: ./agents/test-reviewer-a.md
        instruction: |
          Review the architecture.
        rules:
          - condition: approved
          - condition: needs_fix
      - name: security-review
        persona: ./agents/test-reviewer-b.md
        instruction: |
          Review security.
        rules:
          - condition: approved
          - condition: needs_fix
    rules:
      - condition: all("approved")
        next: COMPLETE
      - condition: any("needs_fix")
        next: fix
  - name: fix
    persona: ./agents/test-coder.md
    edit: true
    required_permission_mode: edit
    instruction: |
      Fix the issues found in review.
    rules:
      - condition: Fix applied
        next: review
