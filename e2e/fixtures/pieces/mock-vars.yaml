name: e2e-mock-vars
description: Test vars substitution in instruction_template
max_movements: 3
movements:
  - name: execute
    edit: true
    persona: ../agents/test-coder.md
    allowed_tools:
      - Read
      - Write
    required_permission_mode: edit
    vars:
      target_file: output.txt
      action_verb: Create
    instruction_template: |
      {action_verb} a file called {target_file}.
    rules:
      - condition: Done
        next: COMPLETE
