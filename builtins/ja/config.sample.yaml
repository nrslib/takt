# TAKT グローバル設定サンプル
# 配置場所: ~/.takt/config.sample.yaml
#
# 必要な項目を ~/.takt/config.yaml にコピーし、コメントを外して使います。
# TAKT が読み込むのは config.yaml です。このファイルはコメント付きカタログです。

# =====================================
# 通常設定
# =====================================
# language: ja        # 表示言語: ja | en

# デフォルトプロバイダー・モデル
# provider: claude                    # claude | claude-sdk | claude-terminal | codex | opencode | cursor | copilot | kiro | mock
# model: sonnet                       # プロバイダーへそのまま渡すデフォルトモデル

# 実行制御
# worktree_dir: ~/takt-worktrees       # 共有 clone 作成先ディレクトリ
# prevent_sleep: false                 # macOS 実行中のスリープ防止
# auto_fetch: false                    # clone 前に fetch して最新化するか
# base_branch: main                    # clone のベースブランチ（デフォルト: カレントブランチ）
# concurrency: 1                       # takt run の同時実行タスク数 (1-10)
# task_poll_interval_ms: 500           # 新規タスク検出のポーリング間隔（ms, 100-5000）
# sync_project_local_takt_on_retry: true # Retry / re-execution 前に root の project-local .takt を同期

# PR / ブランチ
# auto_pr: false                       # worktree 実行後に PR を自動作成
# draft_pr: false                      # ドラフト PR として作成
# branch_name_strategy: romaji         # ブランチ名生成: romaji | ai

# パイプライン実行
# pipeline:
#   default_branch_prefix: "takt/"     # パイプラインで作成するブランチのプレフィックス
#   commit_message_template: "{title}" # 変数: {title}, {issue}
#   pr_body_template: "{report}"       # 変数: {issue_body}, {report}, {issue}

# 出力・通知
# minimal_output: false                # エージェント詳細出力を抑制
# notification_sound: true             # 通知音全体の ON/OFF
# notification_sound_events:           # イベント別通知音（未指定は true 扱い）
#   iteration_limit: true
#   workflow_complete: true
#   workflow_abort: true
#   run_complete: true
#   run_abort: true
# logging:
#   level: info                        # debug | info | warn | error
#   trace: true                        # trace.md 実行レポート生成
#   debug: false                       # debug.log + prompts.jsonl を有効化
#   provider_events: false             # provider イベントログを記録
#   usage_events: false                # 使用量イベントログを記録

# OpenTelemetry observability
# observability:
#   enabled: true                      # OpenTelemetry SDK を初期化
#   monitor: true                      # .takt/runs/<run>/monitor.json を出力
#   session_log_exporter: true         # span 由来の shadow session log を出力
#   usage_events_phase: true           # phase 粒度の usage event log を出力
# OTEL_EXPORTER_OTLP_ENDPOINT を設定すると span と metric も OTLP HTTP で送信します。
# 任意の OTLP 上書き: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT, OTEL_EXPORTER_OTLP_METRICS_ENDPOINT.

# アナリティクス
# analytics:
#   enabled: true                      # ローカルアナリティクス収集を有効化
#   events_path: ~/.takt/analytics/events
#   retention_days: 30

# インタラクティブモード
# interactive_preview_steps: 3         # step プレビュー数 (0-10)

