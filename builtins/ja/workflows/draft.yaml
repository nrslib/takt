name: draft
description: takt-default の Phase 1。実装 → AI アンチパターン自己レビュー ⇄ 修正 ループ。
subworkflow:
  callable: true
  visibility: internal
  returns:
    - need_replan
  params:
    impl_knowledge:
      type: facet_ref[]
      facet_kind: knowledge
      default:
        - takt
        - architecture
        - task-decomposition
    fix_knowledge:
      type: facet_ref[]
      facet_kind: knowledge
      default:
        - takt
        - architecture
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 30
initial_step: implement
loop_monitors:
  - cycle:
      - ai-antipattern-review-1st
      - ai-antipattern-fix
    threshold: 5
    judge:
      persona: supervisor
      instruction: loop-monitor-ai-antipattern-fix
      rules:
        - condition: 健全（進捗あり）
          next: ai-antipattern-review-1st
        - condition: 非生産的（改善なし）
          next: COMPLETE
steps:
  - name: implement
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    session: refresh
    knowledge:
      $param: impl_knowledge
    provider_options:
      $ref: provider-options/edit.yaml
    required_permission_mode: edit
    team_leader:
      max_parts: 2
      part_persona: coder
      part_edit: true
      part_permission_mode: edit
      part_allowed_tools:
        - Read
        - Glob
        - Grep
        - Edit
        - Write
        - Bash
        - WebSearch
        - WebFetch
    instruction: team-leader-implement
    rules:
      - condition: 実装完了
        next: ai-antipattern-review-1st
      - condition: 実装未着手（レポートのみ）
        next: ai-antipattern-review-1st
      - condition: 判断できない、情報不足
        return: need_replan
      - condition: ユーザー入力が必要
        next: implement
        requires_user_input: true
        interactive_only: true
    output_contracts:
      report:
        - name: coder-scope.md
          format: coder-scope
        - name: coder-decisions.md
          format: coder-decisions
  - name: ai-antipattern-review-1st
    edit: false
    persona: ai-antipattern-reviewer
    policy:
      - review
      - ai-antipattern
    provider_options:
      $ref: provider-options/review-web.yaml
    rules:
      - condition: AI特有の問題なし
        next: COMPLETE
      - condition: AI特有の問題あり
        next: ai-antipattern-fix
    instruction: ai-antipattern-review
    output_contracts:
      report:
        - name: ai-antipattern-review.md
          format: ai-antipattern-review
  - name: ai-antipattern-fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    session: refresh
    knowledge:
      $param: fix_knowledge
    provider_options:
      $ref: provider-options/edit.yaml
    required_permission_mode: edit
    pass_previous_response: false
    rules:
      - condition: AI問題の修正完了
        next: ai-antipattern-review-1st
      - condition: 修正不要（指摘対象ファイル/仕様の確認済み）
        next: ai-antipattern-no-fix
      - condition: 判断できない、情報不足
        next: ai-antipattern-no-fix
    instruction: ai-antipattern-fix
  - name: ai-antipattern-no-fix
    edit: false
    persona: architecture-reviewer
    policy: review
    provider_options:
      $ref: provider-options/review-files.yaml
    rules:
      - condition: ai-antipattern-review-1stの指摘が妥当（修正すべき）
        next: ai-antipattern-fix
      - condition: ai-antipattern-fixの判断が妥当（修正不要）
        next: COMPLETE
    instruction: arbitrate
