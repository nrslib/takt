name: audit-unit
description: ユニットテストの全件監査。振る舞いとカバレッジ不足を棚卸しし、コード修正なしで Issue 直貼り可能なレポートを作成する
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 12
initial_step: plan

loop_monitors:
  - cycle: [supervise, review]
    threshold: 4
    judge:
      persona: supervisor
      instruction: |
        unit audit の supervise → review サイクルが {cycle_count} 回繰り返されました。
        監査の完全性と品質を総合的に判断し、現状の結果で受け入れるか判断してください。
      rules:
        - condition: 十分な品質に達している
          next: COMPLETE
        - condition: 品質が不十分だが改善の見込みがない
          next: ABORT

steps:
  - name: plan
    edit: false
    persona: test-planner
    policy: testing
    knowledge:
      - architecture
      - unit-testing
    instruction: unit-audit-plan
    output_contracts:
      report:
        - name: 01-unit-audit-plan.md
          format: unit-audit-plan
    rules:
      - condition: 監査計画が完了
        next: audit
      - condition: ユーザーが質問をしている（監査タスクではない）
        next: COMPLETE
      - condition: 要件が不明確、情報不足
        next: ABORT

  - name: audit
    edit: false
    persona: testing-reviewer
    policy:
      - review
      - testing
    knowledge:
      - architecture
      - unit-testing
    instruction: unit-audit-team-leader
    team_leader:
      max_parts: 3
      part_persona: testing-reviewer
      part_edit: false
    output_contracts:
      report:
        - name: 02-unit-audit.md
          format: unit-audit
    rules:
      - condition: 監査完了
        next: supervise

  - name: supervise
    edit: false
    persona: supervisor
    policy: review
    knowledge:
      - unit-testing
    instruction: unit-audit-supervise
    pass_previous_response: false
    rules:
      - condition: 監査が完全で Issue 化できる品質に達している
        next: COMPLETE
      - condition: カバレッジ監査が不完全、または根拠が不足している
        next: review

  - name: review
    edit: false
    persona: testing-reviewer
    policy:
      - review
      - testing
    knowledge:
      - unit-testing
    instruction: unit-audit-review
    rules:
      - condition: 再監査完了
        next: supervise
