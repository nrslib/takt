name: default-mini
description: テストなし Mini 開発ワークフロー（計画 → draft（実装 + AI 自己レビュー） → peer-review（3並列） → COMPLETE）
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 30
initial_step: plan
steps:
  - name: plan
    tags:
      - plan
    edit: false
    persona: planner
    knowledge: architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    rules:
      - condition: 要件が明確で実装可能
        next: draft
      - condition: ユーザーが質問をしている（実装タスクではない）
        next: COMPLETE
      - condition: 要件が不明確、情報不足
        next: ABORT
        appendix: |
          確認事項:
          - {質問1}
          - {質問2}
    instruction: plan
    output_contracts:
      report:
        - name: plan.md
          format: plan
  - name: draft
    kind: workflow_call
    call: default-draft
    rules:
      - condition: COMPLETE
        next: peer-review
      - condition: need_replan
        next: plan
      - condition: ABORT
        next: ABORT
  - name: peer-review
    kind: workflow_call
    call: default-peer-review
    rules:
      - condition: COMPLETE
        next: COMPLETE
      - condition: need_replan
        next: plan
      - condition: ABORT
        next: ABORT
