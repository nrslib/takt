name: backend-cqrs
description: テストファースト・AIレビュー・2段階レビュー・修正ループ・監督付きCQRS+ES開発
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 60
initial_step: plan
loop_monitors:
  - cycle:
      - ai-antipattern-review-1st
      - ai-antipattern-fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-ai-antipattern-fix
      rules:
        - condition: 健全（進捗あり）
          next: ai-antipattern-review-1st
        - condition: 非生産的（改善なし）
          next: reviewers_1
  - cycle:
      - reviewers_1
      - reviewers_2
      - final-gate
      - fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-reviewers-fix
      rules:
        - condition: 健全（指摘数が減少、修正が反映されている）
          next: reviewers_1
        - condition: 非生産的（同じ指摘が繰り返される）
          next: final-gate
steps:
  - name: plan
    tags:
      - plan
    edit: false
    persona: planner
    knowledge:
      - backend
      - cqrs-es
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    instruction: plan
    rules:
      - condition: タスク分析と計画が完了した
        next: write_tests
      - condition: 要件が不明確で計画を立てられない
        next: ABORT
    output_contracts:
      report:
        - name: plan.md
          format: plan
  - name: write_tests
    tags:
      - coding
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    knowledge:
      - backend
      - cqrs-es
      - architecture
      - unit-testing
      - e2e-testing
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction: write-tests-first
    rules:
      - condition: テスト作成が完了した
        next: implement
      - condition: 実装対象が未実装のためテスト作成をスキップ
        next: implement
      - condition: テスト作成を進行できない
        next: plan
      - condition: ユーザー入力が必要
        next: write_tests
        requires_user_input: true
        interactive_only: true
    output_contracts:
      report:
        - name: test-report.md
          format: test-report
  - name: implement
    tags:
      - coding
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    session: refresh
    knowledge:
      - backend
      - cqrs-es
      - security
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    instruction: implement
    rules:
      - condition: 実装が完了した
        next: ai-antipattern-review-1st
      - condition: 実装未着手（レポートのみ）
        next: ai-antipattern-review-1st
      - condition: 実装を進行できない
        next: ai-antipattern-review-1st
      - condition: ユーザー入力が必要
        next: implement
        requires_user_input: true
        interactive_only: true
    output_contracts:
      report:
        - name: coder-scope.md
          format: coder-scope
        - name: coder-decisions.md
          format: coder-decisions
  - name: ai-antipattern-review-1st
    tags:
      - review
    edit: false
    persona: ai-antipattern-reviewer
    policy:
      - review
      - ai-antipattern
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    instruction: ai-antipattern-review
    rules:
      - condition: AI特有の問題が見つからない
        next: reviewers_1
      - condition: AI特有の問題が検出された
        next: ai-antipattern-fix
    output_contracts:
      report:
        - name: ai-antipattern-review.md
          format: ai-antipattern-review
  - name: ai-antipattern-fix
    tags:
      - coding
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    session: refresh
    knowledge:
      - backend
      - cqrs-es
      - security
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    instruction: ai-antipattern-fix
    pass_previous_response: false
    rules:
      - condition: AI Reviewerの指摘に対する修正が完了した
        next: ai-antipattern-review-1st
      - condition: 修正不要（指摘対象ファイル/仕様の確認済み）
        next: ai-antipattern-no-fix
      - condition: 修正を進行できない
        next: ai-antipattern-no-fix
  - name: ai-antipattern-no-fix
    tags:
      - review
    edit: false
    persona: architecture-reviewer
    policy: review
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
    rules:
      - condition: ai-antipattern-review-1stの指摘が妥当（修正すべき）
        next: ai-antipattern-fix
      - condition: ai-antipattern-fixの判断が妥当（修正不要）
        next: reviewers_1
    instruction: arbitrate
  - name: reviewers_1
    tags:
      - review
    parallel:
      - name: cqrs-es-review
        tags:
          - review
        edit: false
        persona: cqrs-es-reviewer
        policy: review
        knowledge:
          - cqrs-es
          - backend
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-cqrs-es
        output_contracts:
          report:
            - name: cqrs-es-review.md
              format: cqrs-es-review
      - name: testing-review
        tags:
          - review
        edit: false
        persona: testing-reviewer
        policy:
          - review
          - testing
        knowledge:
          - unit-testing
          - e2e-testing
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-test
        output_contracts:
          report:
            - name: testing-review.md
              format: testing-review
      - name: ai-antipattern-review-2nd
        tags:
          - review
        edit: false
        persona: ai-antipattern-reviewer
        policy:
          - review
          - ai-antipattern
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        instruction: ai-antipattern-review
        rules:
          - condition: approved
          - condition: needs_fix
        output_contracts:
          report:
            - name: ai-antipattern-review.md
              format: ai-antipattern-review
    rules:
      - condition: all("approved")
        next: reviewers_2
      - condition: any("needs_fix")
        next: fix
  - name: reviewers_2
    tags:
      - review
    parallel:
      - name: security-review
        tags:
          - review
        edit: false
        persona: security-reviewer
        policy: review
        knowledge: security
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-security
        output_contracts:
          report:
            - name: security-review.md
              format: security-review
      - name: qa-review
        tags:
          - review
        edit: false
        persona: qa-reviewer
        policy:
          - review
          - qa
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-qa
        output_contracts:
          report:
            - name: qa-review.md
              format: qa-review
      - name: coding-review
        tags:
          - review
        edit: false
        persona: coding-reviewer
        policy:
          - review
          - coding
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        instruction: review-coding
        output_contracts:
          report:
            - name: coding-review.md
              format: coding-review
        rules:
          - condition: approved
          - condition: needs_fix
    rules:
      - condition: all("approved")
        next: final-gate
      - condition: any("needs_fix")
        next: fix
  - name: final-gate
    kind: workflow_call
    call: merge-readiness-dual-final-gate
    args:
      merge_readiness_knowledge:
        - backend
        - cqrs-es
        - security
        - architecture
      supervise_knowledge:
        - backend
        - cqrs-es
        - security
        - architecture
    rules:
      - condition: COMPLETE
        next: COMPLETE
      - condition: needs_fix
        next: fix
      - condition: need_replan
        next: plan
      - condition: ABORT
        next: ABORT
  - name: fix
    tags:
      - coding
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    knowledge:
      - backend
      - cqrs-es
      - security
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    pass_previous_response: false
    rules:
      - condition: 修正が完了した
        next: reviewers_1
      - condition: 修正を進行できない
        next: plan
    instruction: fix
