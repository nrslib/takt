        - condition: 試行済みの再計画を踏まえても要件を満たす実現可能な方針がない
          next: ABORT
  - cycle: [fix, reviewers]
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-reviewers-fix-fc
      rules:
        - condition: 修正後レビューで進捗が確認され、次の修正が実行可能である
          next: fix
        - condition: 同じ指摘が繰り返されるが再計画で解消できる見込みがある
          next: replan
        - condition: 試行済みの再計画を踏まえても要件を満たす実現可能な方針がない
          next: ABORT
  - cycle: [fix, reviewers, boundary-reviewers]
    threshold: 3
    judge:
      persona: supervisor
