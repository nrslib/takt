name: takt-default-localllm
description: ローカルLLMを通常レビューに使い、高信頼モデルへ配線・資源所有権・失敗境界の再検査を割り当てられる Team Leader 版 workflow。provider/model 自体はタグで設定する。
finding_contract:
  ledger_path: .takt/findings/takt-default-localllm.json
  raw_findings_path: .takt/findings/takt-default-localllm/raw
  manager:
    persona: findings-manager
    instruction: findings-manager
    output_contract: findings-manager
max_steps: 50
initial_step: plan

loop_monitors:
  - cycle: [replan, implement]
    threshold: 2
    judge:
      persona: supervisor
      instruction: loop-monitor-fix-replan
      rules:
        - condition: 要件と受入条件を変えずに実装方針を再定義できる
          next: replan
        - condition: 試行済みの再計画を踏まえても要件を満たす実現可能な方針がない
          next: ABORT
  - cycle: [replan, implement, reviewers]
