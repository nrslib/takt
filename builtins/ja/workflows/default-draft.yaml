name: default-draft
description: default 系の Phase 1。実装 → AI アンチパターン自己レビュー ⇄ 修正 ループ。
subworkflow:
  callable: true
  visibility: internal
  returns:
    - need_replan
  params:
    impl_instruction:
      type: facet_ref
      facet_kind: instruction
      default: implement
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 30
initial_step: implement
loop_monitors:
  - cycle:
      - ai-antipattern-review-1st
      - ai-antipattern-fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-ai-antipattern-fix
      rules:
        - condition: 健全（進捗あり）
          next: ai-antipattern-review-1st
        - condition: 非生産的（改善なし）
          next: COMPLETE
steps:
  - name: implement
    tags:
      - coding
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    session: refresh
    knowledge:
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction:
      $param: impl_instruction
    rules:
      - condition: 実装完了
        next: ai-antipattern-review-1st
      - condition: 実装未着手（レポートのみ）
        next: ai-antipattern-review-1st
      - condition: 判断できない、情報不足
        return: need_replan
      - condition: ユーザー入力が必要
        next: implement
        requires_user_input: true
        interactive_only: true
    output_contracts:
      report:
        - name: coder-scope.md
          format: coder-scope
        - name: coder-decisions.md
          format: coder-decisions
  - name: ai-antipattern-review-1st
    tags:
      - review
    edit: false
    persona: ai-antipattern-reviewer
    policy:
      - review
      - ai-antipattern
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    instruction: ai-antipattern-review
    rules:
      - condition: AI特有の問題なし
        next: COMPLETE
      - condition: AI特有の問題あり
        next: ai-antipattern-fix
    output_contracts:
      report:
        - name: ai-antipattern-review.md
          format: ai-antipattern-review
  - name: ai-antipattern-fix
    tags:
      - coding
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    session: refresh
    knowledge:
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction: ai-antipattern-fix
    pass_previous_response: false
    rules:
      - condition: AI問題の修正完了
        next: ai-antipattern-review-1st
      - condition: 修正不要（指摘対象ファイル/仕様の確認済み）
        next: COMPLETE
      - condition: 修正を進行できない
        next: COMPLETE
