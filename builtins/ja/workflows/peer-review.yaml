name: peer-review
description: takt-default の Phase 2。6 並列ピアレビュー（+ ai-antipattern-review-2nd）⇄ 修正 ループ。
finding_contract:
  ledger_path: .takt/findings/peer-review.json
  raw_findings_path: .takt/findings/raw
  manager:
    persona: findings-manager
    instruction: findings-manager
    output_contract: findings-manager
subworkflow:
  callable: true
  visibility: internal
  returns:
    - need_replan
  params:
    arch_knowledge:
      type: facet_ref[]
      facet_kind: knowledge
      default:
        - architecture
        - takt
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 30
initial_step: reviewers
loop_monitors:
  - cycle:
      - reviewers
      - fix
    threshold: 5
    judge:
      persona: supervisor
      instruction: loop-monitor-reviewers-fix
      rules:
        - condition: 健全（指摘数が減少、修正が反映されている）
          next: reviewers
        - condition: 非生産的（同じ指摘が繰り返される）
          next: COMPLETE
steps:
  - name: reviewers
    parallel:
      - name: arch-review
        edit: false
        persona: architecture-reviewer
        policy: review
        knowledge:
          $param: arch_knowledge
        provider_options:
          extends: review-readonly
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-arch
        output_contracts:
          report:
            - name: architect-review.md
              format: architecture-review-finding-contract
      - name: security-review
        edit: false
        persona: security-reviewer
        policy: review
        knowledge: security
        provider_options:
          extends: review-readonly
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-security
        output_contracts:
          report:
            - name: security-review.md
              format: security-review-finding-contract
      - name: qa-review
        edit: false
        persona: qa-reviewer
        policy:
          - review
          - qa
        provider_options:
          extends: review-readonly
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-qa
        output_contracts:
          report:
            - name: qa-review.md
              format: qa-review-finding-contract
      - name: testing-review
        edit: false
        persona: testing-reviewer
        policy:
          - review
          - testing
        knowledge:
          - unit-testing
          - e2e-testing
        provider_options:
          extends: review-readonly
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-test
        output_contracts:
          report:
            - name: testing-review.md
              format: testing-review-finding-contract
      - name: pure-review
        edit: false
        persona: pure-reviewer
        policy: review
        provider_options:
          extends: review-readonly
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-pure
        output_contracts:
          report:
            - name: pure-review.md
              format: pure-review-finding-contract
      - name: coding-review
        edit: false
        persona: coding-reviewer
        policy: review
        pass_previous_response: false
        provider_options:
          extends: review-readonly
        instruction: review-coding
        rules:
          - condition: approved
          - condition: needs_fix
        output_contracts:
          report:
            - name: coding-review.md
              format: coding-review-finding-contract
      - name: ai-antipattern-review-2nd
        edit: false
        persona: ai-antipattern-reviewer
        policy:
          - review
          - ai-antipattern
        provider_options:
          extends: review-web
        instruction: ai-antipattern-review
        rules:
          - condition: approved
          - condition: needs_fix
        output_contracts:
          report:
            - name: ai-antipattern-review.md
              format: ai-antipattern-review-finding-contract
    rules:
      - condition: all("approved") && findings.open.count == 0 && findings.conflicts.count == 0
        next: COMPLETE
      - condition: any("needs_fix") && findings.conflicts.count == 0
        next: fix
      - condition: findings.conflicts.count == 0 && findings.open.count > 0
        next: fix
      - condition: ai("未調停の findings.conflicts がある。coder の修正で解決可能な具体的コード変更が必要な場合のみ fix を選ぶ。レビュワー間の判断矛盾や人間判断が必要な場合は選ばない。")
        next: fix
      - condition: findings.conflicts.count > 0
        return: need_replan
  - name: fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    knowledge:
      - takt
      - architecture
    provider_options:
      extends: edit
    required_permission_mode: edit
    pass_previous_response: false
    rules:
      - condition: 修正完了
        next: reviewers
      - condition: 判断できない、情報不足
        return: need_replan
    instruction: fix
