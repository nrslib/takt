name: auto-improvement-loop
description: >
  PR・Issue・新規改善を巡回しながら次の task を積み続ける
  orchestration loop workflow。
max_steps: infinite
initial_step: route_context
schemas:
  followup-task: followup-task
steps:
  - name: route_context
    mode: system
    system_inputs:
      - type: task_context
        source: current_task
        as: task
      - type: branch_context
        source: current_task
        as: branch
      - type: pr_list
        source: current_project
        as: prs
        where:
          head_branch: takt/*
          managed_by_takt: true
          labels: ['takt-managed']
          same_repository: true
          draft: false
      - type: pr_selection
        source: current_project
        as: selected_pr
        where:
          head_branch: takt/*
          managed_by_takt: true
          labels: ['takt-managed']
          same_repository: true
          draft: false
      - type: issue_context
        source: current_task
        as: issue
    rules:
      - when: context.route_context.selected_pr.exists == true
        next: plan_from_existing_pr
      - when: context.route_context.selected_pr.exists == false && context.route_context.issue.exists == true
        next: plan_from_issue
      - when: context.route_context.selected_pr.exists == false && context.route_context.issue.exists == false
        next: plan_fresh_improvement

  - name: plan_from_issue
    persona: supervisor
    knowledge:
      - architecture
      - takt
    delay_before_ms: 60000
    instruction: |
      現在の Issue とコード状態を確認し、
      次に実行すべき改善 task を 1 件だけ計画してください。

      現在の Issue:
      - exists: {context:route_context.issue.exists}
      - number: {context:route_context.issue.number}
      - title: {context:route_context.issue.title}
      - task_exists: {context:route_context.task.exists}
      - branch_exists: {context:route_context.branch.exists}

      実装は行わず、次タスクの指示書だけを task_markdown に出力してください。
      action には次アクションを出力してください。
      必要なら issue に Issue 作成方針を出力してください。
      現在の実行コンテキスト:
      - task_exists: {context:route_context.task.exists}
      - branch_exists: {context:route_context.branch.exists}

      action の候補:
      - enqueue_new_task
      - noop
    structured_output:
      schema_ref: followup-task
    rules:
      - when: structured.plan_from_issue.action == "enqueue_new_task"
        next: enqueue_from_issue
      - when: structured.plan_from_issue.action == "noop"
        next: wait_before_next_scan
      - when: "true"
        next: ABORT

  - name: enqueue_from_issue
    mode: system
    effects:
      - type: enqueue_task
        mode: new
        workflow: takt-default
        base_branch: improve
        task: "{structured:plan_from_issue.task_markdown}"
        issue: "{structured:plan_from_issue.issue}"
        worktree:
          enabled: true
          auto_pr: true
          draft_pr: true
    rules:
      - when: effect.enqueue_from_issue.enqueue_task.success == true
        next: wait_before_next_scan
      - when: "true"
        next: ABORT

  - name: plan_fresh_improvement
    persona: supervisor
    knowledge:
      - architecture
      - takt
    delay_before_ms: 60000
    instruction: |
      現在のコードベースを確認し、
      次に実行すべき改善 task を 1 件だけ計画してください。

      実装は行わず、次タスクの指示書だけを task_markdown に出力してください。
      action には次アクションを出力してください。
      必要なら issue に Issue 作成方針を出力してください。

      action の候補:
      - enqueue_new_task
      - noop
    structured_output:
      schema_ref: followup-task
    rules:
      - when: structured.plan_fresh_improvement.action == "enqueue_new_task"
        next: enqueue_fresh
      - when: structured.plan_fresh_improvement.action == "noop"
        next: wait_before_next_scan
      - when: "true"
        next: ABORT

  - name: enqueue_fresh
    mode: system
    effects:
      - type: enqueue_task
        mode: new
        workflow: takt-default
        base_branch: improve
        task: "{structured:plan_fresh_improvement.task_markdown}"
        issue: "{structured:plan_fresh_improvement.issue}"
        worktree:
          enabled: true
          auto_pr: true
          draft_pr: true
    rules:
      - when: effect.enqueue_fresh.enqueue_task.success == true
        next: wait_before_next_scan
      - when: "true"
        next: ABORT

  - name: plan_from_existing_pr
    persona: supervisor
    knowledge:
      - architecture
      - takt
    instruction: |
      現在の PR を確認し、次に取るべきアクションを判断してください。

      現在の PR:
      - count: {context:route_context.prs.length}
      - number: {context:route_context.selected_pr.number}
      - author: {context:route_context.selected_pr.author}
      - base_branch: {context:route_context.selected_pr.base_branch}
      - head_branch: {context:route_context.selected_pr.head_branch}

      action には次アクションを出力してください。
      修正 task が必要なら task_markdown に出力してください。
      PR に残す内容があれば pr_comment_markdown に出力してください。

      action の候補:
      - comment_on_pr
      - enqueue_from_pr
      - prepare_merge
      - noop
    structured_output:
      schema_ref: followup-task
    rules:
      - when: structured.plan_from_existing_pr.action == "comment_on_pr"
        next: comment_on_existing_pr
      - when: structured.plan_from_existing_pr.action == "enqueue_from_pr"
        next: enqueue_from_pr
      - when: structured.plan_from_existing_pr.action == "prepare_merge"
        next: prepare_merge
      - when: structured.plan_from_existing_pr.action == "noop"
        next: wait_before_next_scan
      - when: "true"
        next: ABORT

  - name: comment_on_existing_pr
    mode: system
    effects:
      - type: comment_pr
        pr: "{context:route_context.selected_pr.number}"
        body: "{structured:plan_from_existing_pr.pr_comment_markdown}"
    rules:
      - when: effect.comment_on_existing_pr.comment_pr.success == true
        next: wait_before_next_scan
      - when: "true"
        next: ABORT

  - name: enqueue_from_pr
    mode: system
    effects:
      - type: enqueue_task
        mode: from_pr
        pr: "{context:route_context.selected_pr.number}"
        workflow: takt-default
        base_branch: improve
        task: "{structured:plan_from_existing_pr.task_markdown}"
    rules:
      - when: effect.enqueue_from_pr.enqueue_task.success == true
        next: wait_before_next_scan
      - when: "true"
        next: ABORT

  - name: prepare_merge
    mode: system
    effects:
      - type: sync_with_root
        pr: "{context:route_context.selected_pr.number}"
    rules:
      - when: effect.prepare_merge.sync_with_root.success == true
        next: merge_pr
      - when: effect.prepare_merge.sync_with_root.conflicted == true
        next: resolve_conflicts
      - when: "true"
        next: ABORT

  - name: resolve_conflicts
    mode: system
    effects:
      - type: resolve_conflicts_with_ai
        pr: "{context:route_context.selected_pr.number}"
    rules:
      - when: effect.resolve_conflicts.resolve_conflicts_with_ai.success == true
        next: merge_pr
      - when: effect.resolve_conflicts.resolve_conflicts_with_ai.failed == true
        next: enqueue_conflict_resolution_task
      - when: "true"
        next: ABORT

  - name: enqueue_conflict_resolution_task
    mode: system
    effects:
      - type: enqueue_task
        mode: from_pr
        pr: "{context:route_context.selected_pr.number}"
        workflow: takt-default
        base_branch: improve
        task: |
          PR の base branch 取り込み時に発生したコンフリクトを解消すること。
          対象 PR: {context:route_context.selected_pr.number}
    rules:
      - when: effect.enqueue_conflict_resolution_task.enqueue_task.success == true
        next: wait_before_next_scan
      - when: "true"
        next: ABORT

  - name: merge_pr
    mode: system
    effects:
      - type: merge_pr
        pr: "{context:route_context.selected_pr.number}"
    rules:
      - when: effect.merge_pr.merge_pr.success == true
        next: wait_before_next_scan
      - when: "true"
        next: ABORT

  - name: wait_before_next_scan
    mode: system
    delay_before_ms: 60000
    system_inputs:
      - type: task_queue_context
        source: current_project
        as: queue
        exclude_current_task: true
    rules:
      - when: exists(context.wait_before_next_scan.queue.items, item.kind == "running")
        next: wait_before_next_scan
      - when: "true"
        next: route_context
