name: frontend-for-local-llm
description: ローカルLLM向けのフロントエンド開発ワークフロー。観点別レビュー4並列 + Finding Contract で弱いモデルの規律を構造で作る
finding_contract:
  ledger_path: .takt/findings/frontend-for-local-llm.json
  raw_findings_path: .takt/findings/frontend-for-local-llm/raw
  manager:
    persona: findings-manager
    instruction: findings-manager
    output_contract: findings-manager
max_steps: 50
initial_step: plan
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true

loop_monitors:
  - cycle:
      - ai-antipattern-review-1st
      - ai-antipattern-fix
    threshold: 5
    judge:
      persona: supervisor
      instruction: loop-monitor-ai-antipattern-fix-1st
      rules:
        - condition: 健全（進捗あり）
          next: ai-antipattern-review-1st
        - condition: 非生産的（改善なし）
          next: reviewers
  - cycle:
      - ai-antipattern-fix
      - ai-antipattern-no-fix
    threshold: 5
    judge:
      persona: supervisor
      instruction: loop-monitor-ai-antipattern-fix-1st
      rules:
        - condition: 健全（進捗あり）
          next: ai-antipattern-review-1st
        - condition: 非生産的（改善なし）
          next: reviewers
  - cycle:
      - plan
      - write_tests
      - implement
      - reviewers
      - fix
    threshold: 2
    judge:
      persona: supervisor
      instruction: loop-monitor-fix-replan
      rules:
        - condition: 直近の fix は修正完了で終わっている（行き詰まりではない）
          next: reviewers
        - condition: 健全（再計画のたびに blocker が解消へ向かっている）
          next: plan
        - condition: 非生産的（同じ行き詰まりが繰り返されている）
          next: ABORT
  - cycle:
      - reviewers
      - fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-reviewers-fix
      rules:
        - condition: 健全（指摘数が減少、修正が反映されている）
          next: reviewers
        - condition: 非生産的（同じ指摘が繰り返される）だが、計画の立て直しで打開できる見込みがある
          next: plan
        - condition: 非生産的（同じ指摘が繰り返される）で、再計画でも打開できる見込みがない
          next: ABORT
  - cycle: [reviewers, final-gate, fix]
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-reviewers-fix
      rules:
        - condition: 健全（指摘数が減少、修正が反映されている）
          next: reviewers
        - condition: 非生産的（同じ指摘が繰り返される）だが、計画の立て直しで打開できる見込みがある
          next: plan
        - condition: 非生産的（同じ指摘が繰り返される）で、再計画でも打開できる見込みがない
          next: ABORT
steps:
  - name: plan
    tags:
      - plan
    edit: false
    persona: planner
    knowledge:
      - frontend
      - react
      - architecture
    provider_options:
      extends: review-readonly
    instruction: plan
    rules:
      - condition: タスク分析と計画が完了した
        next: write_tests
      - condition: ユーザーが質問をしている（実装タスクではない）
        next: COMPLETE
      - condition: 要件が不明確で計画を立てられない
        next: ABORT
    output_contracts:
      report:
        - name: plan.md
          format: plan-frontend

  - name: write_tests
    tags:
      - coding
      - test-planning
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    knowledge:
      - frontend
      - react
      - architecture
      - unit-testing
      - e2e-testing
      - implementation-semantics
    provider_options:
      extends: edit
    required_permission_mode: edit
    instruction: write-tests-first
    rules:
      - condition: テスト作成が完了した
        next: implement
      - condition: 実装対象が未実装のためテスト作成をスキップ
        next: implement
      - condition: テスト作成を進行できない
        next: plan
      - condition: ユーザー入力が必要
        next: write_tests
        requires_user_input: true
        interactive_only: true
    output_contracts:
      report:
        - name: test-report.md
          format: test-report

  - name: implement
    tags:
      - coding
    edit: true
    persona: coder
    policy:
      - coding
    knowledge:
      - frontend
      - react
      - architecture
      - implementation-semantics
    provider_options:
      extends: edit
    required_permission_mode: edit
    instruction: implement
    rules:
      - condition: 実装完了
        next: ai-antipattern-review-1st
      - condition: 実装を進められない（環境問題・情報不足）
        next: plan

  # 本流の frontend.yaml と同じ工程。観点別の並列レビューへ渡す前に、
  # 実装直後の AI 特有の問題を自分で潰す。弱いモデルほどここで拾える。
  - name: ai-antipattern-review-1st
    session_key: ai-antipattern-review-1st
    tags:
      - review
    edit: false
    persona: ai-antipattern-reviewer
    policy:
      - review
      - ai-antipattern
    provider_options:
      extends: review-readonly
    instruction: ai-antipattern-review-for-local-llm
    rules:
      - condition: AI特有の問題なし
        next: reviewers
      - condition: AI特有の問題あり
        next: ai-antipattern-fix
    output_contracts:
      report:
        - name: ai-antipattern-review-1st.md
          format: ai-antipattern-review-finding-contract

  - name: ai-antipattern-fix
    tags:
      - coding
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    session: refresh
    knowledge:
      - frontend
      - react
      - architecture
    provider_options:
      extends: edit
    required_permission_mode: edit
    pass_previous_response: false
    instruction: ai-antipattern-fix
    rules:
      - condition: AI問題の修正完了
        next: ai-antipattern-review-1st
      - condition: 修正不要（指摘対象ファイル/仕様の確認済み）
        next: ai-antipattern-no-fix
      - condition: 判断できない、情報不足
        next: ai-antipattern-no-fix

  - name: ai-antipattern-no-fix
    tags:
      - review
    edit: false
    persona: architecture-reviewer-for-local-llm
    policy: review
    provider_options:
      extends: review-files
    instruction: arbitrate-review-1st
    rules:
      - condition: ai-antipattern-review-1stの指摘が妥当（修正すべき）
        next: ai-antipattern-fix
      - condition: ai-antipattern-fixの判断が妥当（修正不要）
        next: reviewers

  - name: reviewers
    tags:
      - review
    parallel:
      - name: frontend-review
        tags:
          - review
        edit: false
        persona: frontend-reviewer
        policy:
          - review
        knowledge:
          - frontend
          - react
        instruction: review-frontend
        rules:
          - condition: approved
          - condition: needs_fix
        output_contracts:
          report:
            - name: frontend-review.md
              format: frontend-review-finding-contract

      - name: ai-antipattern-review
        session_key: ai-antipattern-review-finding-contract
        tags:
          - review
        edit: false
        persona: ai-antipattern-reviewer
        policy:
          - review
          - ai-antipattern
        pass_previous_response: false
        instruction: ai-antipattern-review-for-local-llm
        rules:
          - condition: AI特有の問題なし
          - condition: AI特有の問題あり
        output_contracts:
          report:
            - name: ai-antipattern-review.md
              format: ai-antipattern-review-finding-contract

      - name: coding-review
        tags:
          - review
        edit: false
        persona: coding-reviewer
        policy:
          - review
          - coding
        pass_previous_response: false
        instruction: review-coding-for-local-llm
        rules:
          - condition: approved
          - condition: needs_fix
        output_contracts:
          report:
            - name: coding-review.md
              format: coding-review-finding-contract

      - name: implementation-semantics-review
        tags:
          - review
        edit: false
        persona: implementation-semantics-reviewer
        policy:
          - review
        knowledge:
          - implementation-semantics
        pass_previous_response: false
        instruction: review-implementation-semantics-for-local-llm
        rules:
          - condition: approved
          - condition: needs_fix
        output_contracts:
          report:
            - name: implementation-semantics-review.md
              format: implementation-semantics-review-finding-contract
    rules:
      - condition: all("approved", "AI特有の問題なし", "approved", "approved") && when(findings.open.count == 0 && findings.conflicts.count == 0)
        next: final-gate
      # provisional が直前ラウンドから意味的な変化の無い fixpoint に達した場合、
      # 再計画では解消し得ない（対策バッチ B1: raw finding 梯子設計 v2 の収束性対策）。
      # plan への差し戻しの前に、要人手裁定の終端状態へルーティングする。
      # review-integrity ゲート（codex 対策#4 / 検証ブロッカー#1）: product gate が
      # 空（open finding 無し）でも未昇格の reviewer anomaly が残るなら、下の fix
      # ルールへ落とさず final-gate へ渡す（final-gate が review-integrity 予算の
      # 範囲で再レビューし、尽きたら裁定する）。直すものは無い（観測は検証不能として
      # 隔離済み）ので、anomaly は fix ではなく再レビューへ送る。
      - condition: when(findings.open.count == 0 && findings.conflicts.count == 0 && findings.reviewerAnomalies.count > 0)
        next: final-gate
      - condition: when(findings.provisional.fixpoint == true && findings.conflicts.count == 0)
        next: NEEDS_ADJUDICATION
      # 累積ラウンド数（または設定されていれば経過時間）が finding_contract.stop_budget
      # を超過した場合、provisional 集合が churn し続けて fixpoint に到達しなくても、
      # plan への差し戻しの前に同じ要人手裁定の終端状態へルーティングする
      # （有限停止予算 — codex 裁定による対策バッチ B1 の拡張）。
      - condition: when(findings.rounds.budgetExhausted == true && findings.conflicts.count == 0)
        next: NEEDS_ADJUDICATION
      # provisional（意味を確定できなかった観測）は fixer が直接直せない system finding。
      # fix ループへ入れず再計画へ返す（raw finding 梯子設計 v2）。
      - condition: when(findings.provisional.count > 0 && findings.conflicts.count == 0)
        next: plan
      - condition: any("needs_fix", "AI特有の問題あり") && when(findings.conflicts.count == 0)
        next: fix
      - condition: when(findings.conflicts.count == 0 && findings.open.count > 0)
        next: fix
      - condition: when(findings.conflicts.count > 0 && findings.conflicts.unadjudicated.count > 0)
        next: finding-conflict-adjudication
      - condition: when(findings.conflicts.count > 0)
        next: ABORT

  # merge-readiness review と supervise は FC 対応 final gate 内で逐次実行する。
  # 子ワークフローはこのワークフローの Finding Contract と共有台帳を継承する。
  - name: final-gate
    kind: workflow_call
    call: merge-readiness-finding-contract-final-gate-for-local-llm
    args:
      supervise_knowledge:
        - frontend
        - react
        - architecture
    rules:
      - condition: COMPLETE
        next: COMPLETE
      - condition: needs_review
        next: reviewers
      - condition: need_replan
        next: plan
      - condition: needs_fix
        next: fix
      - condition: needs_conflict_adjudication
        next: finding-conflict-adjudication
      - condition: ABORT
        next: ABORT

  - name: fix
    tags:
      - coding
    edit: true
    persona: coder
    policy:
      - coding
    knowledge:
      - frontend
      - react
      - architecture
      - implementation-semantics
    provider_options:
      extends: edit
    required_permission_mode: edit
    instruction: fix
    rules:
      - condition: 修正完了
        next: reviewers
      - condition: 修正を進められない、または人間の判断が必要
        next: plan
        appendix: |
          修正が行き詰まりました。直前の差し戻し内容と行き詰まりの理由を読み、
          作業を分解し直して再計画してください。本当に人間の判断が必要だと
          判断した場合のみ、その根拠を明記して計画不能を宣言してください。
