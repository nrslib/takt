name: review-fix-takt-default
description: TAKTй–Ӣзҷәеҗ‘гҒ‘еӨҡи§’гғ¬гғ“гғҘгғјпјӢдҝ®жӯЈгғ«гғјгғ—пјҲеҲқеӣһ7дёҰеҲ—гғ¬гғ“гғҘгғјпјҲгӮігғјгғҮгӮЈгғігӮ°гғ¬гғ“гғҘгғјеҗ«гӮҖпјүгҖҒдҝ®жӯЈеҫҢгҒҜAIгӮўгғігғҒгғ‘гӮҝгғјгғідәӢеүҚгғ¬гғ“гғҘгғјпјӢдёҰеҲ—гғ¬гғ“гғҘгғјгҖҒзӣЈзқЈиҖ…жҢҮж‘ҳгҒ®еҶҚдҝ®жӯЈпјү
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 50
initial_step: gather
loop_monitors:
  - cycle:
      - ai-antipattern-review-1st
      - ai-antipattern-fix
    threshold: 5
    judge:
      persona: supervisor
      instruction: loop-monitor-ai-antipattern-fix
      rules:
        - condition: еҒҘе…ЁпјҲйҖІжҚ—гҒӮгӮҠпјү
          next: ai-antipattern-review-1st
        - condition: йқһз”ҹз”Јзҡ„пјҲж”№е–„гҒӘгҒ—пјү
          next: reviewers
  - cycle:
      - reviewers
      - fix
    threshold: 5
    judge:
      persona: supervisor
      instruction: loop-monitor-reviewers-fix
      rules:
        - condition: еҒҘе…ЁпјҲжҢҮж‘ҳжёӣе°‘гғ»дҝ®жӯЈеҸҚжҳ пјү
          next: reviewers
        - condition: йқһз”ҹз”Јзҡ„пјҲеҗҢгҒҳжҢҮж‘ҳгҒ®еҸҚеҫ©пјү
          next: supervise

steps:
  - name: gather
    tags:
      - plan
    edit: false
    persona: planner
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    instruction: gather-review
    output_contracts:
      report:
        - name: review-target.md
          format: review-gather
    rules:
      - condition: гғ¬гғ“гғҘгғјеҜҫиұЎгҒ®жғ…е ұеҸҺйӣҶе®ҢдәҶ
        next: reviewers
      - condition: гғ¬гғ“гғҘгғјеҜҫиұЎгӮ’зү№е®ҡгҒ§гҒҚгҒӘгҒ„гҖҒжғ…е ұдёҚи¶і
        next: ABORT
        appendix: |
          зўәиӘҚдәӢй …:
          - {иіӘе•Ҹ1}
          - {иіӘе•Ҹ2}

  - name: reviewers
    tags:
      - review
    parallel:
      - name: arch-review
        tags:
          - review
        edit: false
        persona: architecture-reviewer
        policy:
          - review
          - review-finding-contract
        knowledge:
          - architecture
          - takt
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        instruction: review-arch
        output_contracts:
          report:
            - name: architect-review.md
              format: architecture-review
        rules:
          - condition: approved
          - condition: needs_fix

      - name: security-review
        tags:
          - review
        edit: false
        persona: security-reviewer
        policy:
          - review
          - review-finding-contract
        knowledge: security
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        instruction: review-security
        output_contracts:
          report:
            - name: security-review.md
              format: security-review
        rules:
          - condition: approved
          - condition: needs_fix

      - name: qa-review
        tags:
          - review
        edit: false
        persona: qa-reviewer
        policy:
          - review
          - review-finding-contract
          - qa
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        instruction: review-qa
        output_contracts:
          report:
            - name: qa-review.md
              format: qa-review
        rules:
          - condition: approved
          - condition: needs_fix

      - name: testing-review
        tags:
          - review
        edit: false
        persona: testing-reviewer
        policy:
          - review
          - review-finding-contract
          - testing
        knowledge:
          - unit-testing
          - e2e-testing
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        instruction: review-test
        output_contracts:
          report:
            - name: testing-review.md
              format: testing-review
        rules:
          - condition: approved
          - condition: needs_fix

      - name: ai-antipattern-review-2nd
        tags:
          - review
        edit: false
        persona: ai-antipattern-reviewer
        policy:
          - review
          - review-finding-contract
          - ai-antipattern
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        instruction: ai-antipattern-review
        output_contracts:
          report:
            - name: ai-antipattern-review.md
              format: ai-antipattern-review
        rules:
          - condition: approved
          - condition: needs_fix

      - name: pure-review
        tags:
          - review
        edit: false
        persona: pure-reviewer
        policy:
          - review
          - review-finding-contract
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        instruction: review-pure
        output_contracts:
          report:
            - name: pure-review.md
              format: pure-review
        rules:
          - condition: approved
          - condition: needs_fix

      - name: coding-review
        tags:
          - review
        edit: false
        persona: coding-reviewer
        policy:
          - review
          - review-finding-contract
          - coding
        knowledge:
          - architecture
          - takt
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        instruction: review-coding
        output_contracts:
          report:
            - name: coding-review.md
              format: coding-review
        rules:
          - condition: approved
          - condition: needs_fix

    rules:
      - condition: all("approved")
        next: supervise
      - condition: any("needs_fix")
        next: fix

  - name: fix
    tags:
      - coding
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    knowledge:
      - takt
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    pass_previous_response: false
    instruction: fix
    rules:
      - condition: дҝ®жӯЈе®ҢдәҶ
        next: ai-antipattern-review-1st
      - condition: еҲӨж–ӯгҒ§гҒҚгҒӘгҒ„гҖҒжғ…е ұдёҚи¶і
        next: ABORT

  - name: ai-antipattern-review-1st
    tags:
      - review
    edit: false
    persona: ai-antipattern-reviewer
    policy:
      - review
      - review-finding-contract
      - ai-antipattern
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    rules:
      - condition: AIеӣәжңүгҒ®е•ҸйЎҢгҒӘгҒ—
        next: reviewers
      - condition: AIеӣәжңүгҒ®е•ҸйЎҢгҒӮгӮҠ
        next: ai-antipattern-fix
    instruction: ai-antipattern-review
    output_contracts:
      report:
        - name: ai-antipattern-review.md
          format: ai-antipattern-review
  - name: ai-antipattern-fix
    tags:
      - coding
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    knowledge:
      - takt
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    pass_previous_response: false
    rules:
      - condition: AIе•ҸйЎҢдҝ®жӯЈе®ҢдәҶ
        next: ai-antipattern-review-1st
      - condition: дҝ®жӯЈдёҚиҰҒпјҲеҜҫиұЎгғ•гӮЎгӮӨгғ«гғ»д»•ж§ҳзўәиӘҚжёҲгҒҝпјү
        next: ai-antipattern-no-fix
      - condition: еҲӨж–ӯгҒ§гҒҚгҒӘгҒ„гҖҒжғ…е ұдёҚи¶і
        next: ai-antipattern-no-fix
    instruction: ai-antipattern-fix
  - name: ai-antipattern-no-fix
    tags:
      - review
    edit: false
    persona: architecture-reviewer
    policy:
      - review
      - review-finding-contract
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
    rules:
      - condition: ai-antipattern-review-1stгҒ®жҢҮж‘ҳгҒҢеҰҘеҪ“пјҲдҝ®жӯЈеҝ…иҰҒпјү
        next: ai-antipattern-fix
      - condition: ai-antipattern-fixгҒ®еҲӨж–ӯгҒҢеҰҘеҪ“пјҲдҝ®жӯЈдёҚиҰҒпјү
        next: reviewers
    instruction: arbitrate
  - name: supervise
    tags:
      - review
    edit: false
    persona: supervisor
    policy:
      - review
      - review-finding-contract
    knowledge: architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    instruction: supervise
    pass_previous_response: false
    rules:
      - condition: гҒҷгҒ№гҒҰе•ҸйЎҢгҒӘгҒ—
        next: COMPLETE
      - condition: иҰҒжұӮжңӘйҒ”жҲҗгҖҒгғҶгӮ№гғҲеӨұж•—гҖҒгғ“гғ«гғүгӮЁгғ©гғј
        next: fix_supervisor
    output_contracts:
      report:
        - name: supervisor-validation.md
          format: supervisor-validation
        - name: summary.md
          format: summary
          use_judge: false
  - name: fix_supervisor
    tags:
      - coding
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    knowledge:
      - takt
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction: fix-supervisor
    pass_previous_response: false
    rules:
      - condition: зӣЈзқЈиҖ…гҒ®жҢҮж‘ҳгҒ«еҜҫгҒҷгӮӢдҝ®жӯЈгҒҢе®ҢдәҶгҒ—гҒҹ
        next: supervise
      - condition: дҝ®жӯЈгӮ’йҖІиЎҢгҒ§гҒҚгҒӘгҒ„
        next: supervise
