name: default-draft
description: default series Phase 1. Implement -> AI-antipattern self-review ⇄ fix loop.
subworkflow:
  callable: true
  visibility: internal
  returns:
    - need_replan
  params:
    impl_instruction:
      type: facet_ref
      facet_kind: instruction
      default: implement
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 30
initial_step: implement
loop_monitors:
  - cycle:
      - ai-antipattern-review-1st
      - ai-antipattern-fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-ai-antipattern-fix
      rules:
        - condition: Healthy (making progress)
          next: ai-antipattern-review-1st
        - condition: Unproductive (no improvement)
          next: COMPLETE
steps:
  - name: implement
    tags:
      - coding
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    session: refresh
    knowledge:
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction:
      $param: impl_instruction
    rules:
      - condition: Implementation complete
        next: ai-antipattern-review-1st
      - condition: No implementation (report only)
        next: ai-antipattern-review-1st
      - condition: Cannot proceed, insufficient info
        return: need_replan
      - condition: User input required
        next: implement
        requires_user_input: true
        interactive_only: true
    output_contracts:
      report:
        - name: coder-scope.md
          format: coder-scope
        - name: coder-decisions.md
          format: coder-decisions
  - name: ai-antipattern-review-1st
    tags:
      - review
    edit: false
    persona: ai-antipattern-reviewer
    policy:
      - review
      - ai-antipattern
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    instruction: ai-antipattern-review
    rules:
      - condition: No AI-specific issues
        next: COMPLETE
      - condition: AI-specific issues found
        next: ai-antipattern-fix
    output_contracts:
      report:
        - name: ai-antipattern-review.md
          format: ai-antipattern-review
  - name: ai-antipattern-fix
    tags:
      - coding
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    session: refresh
    knowledge:
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction: ai-antipattern-fix
    pass_previous_response: false
    rules:
      - condition: AI issues fixed
        next: ai-antipattern-review-1st
      - condition: No fix needed (verified target files/spec)
        next: COMPLETE
      - condition: Cannot proceed with fixes
        next: COMPLETE
