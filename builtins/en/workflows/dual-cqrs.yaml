name: dual-cqrs
description: Frontend + backend development workflow (CQRS+ES specialized) with CQRS+ES, frontend, security, and QA reviews with fix loops
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 60
initial_step: plan
loop_monitors:
  - cycle:
      - ai-antipattern-review-1st
      - ai-antipattern-fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-ai-antipattern-fix
      rules:
        - condition: Healthy (making progress)
          next: ai-antipattern-review-1st
        - condition: Unproductive (same findings repeated or fixes not reflected)
          next: ai-antipattern-no-fix
  - cycle:
      - reviewers
      - final-gate
      - fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-reviewers-fix
      rules:
        - condition: Healthy (findings decreasing, fixes applied)
          next: reviewers
        - condition: Unproductive (same findings repeating)
          next: final-gate
steps:
  - name: plan
    tags:
      - plan
    edit: false
    persona: planner
    policy:
      - design-planning
    knowledge:
      - frontend
      - backend
      - cqrs-es
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    instruction: plan
    rules:
      - condition: Task analysis and planning is complete
        next: implement
      - condition: Requirements are unclear and planning cannot proceed
        next: ABORT
    output_contracts:
      report:
        - name: plan.md
          format: plan-frontend
  - name: implement
    tags:
      - coding
    edit: true
    persona: coder
    policy:
      - coding
      - testing
      - design-fidelity
      - screen-api
    session: refresh
    knowledge:
      - frontend
      - backend
      - cqrs-es
      - security
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    instruction: implement
    rules:
      - condition: Implementation is complete
        next: ai-antipattern-review-1st
      - condition: No implementation (report only)
        next: ai-antipattern-review-1st
      - condition: Cannot proceed with implementation
        next: ai-antipattern-review-1st
      - condition: User input required
        next: implement
        requires_user_input: true
        interactive_only: true
    output_contracts:
      report:
        - name: coder-scope.md
          format: coder-scope
        - name: coder-decisions.md
          format: coder-decisions
  - name: ai-antipattern-review-1st
    tags:
      - review
    edit: false
    persona: ai-antipattern-reviewer
    policy:
      - review
      - ai-antipattern
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    instruction: ai-antipattern-review
    rules:
      - condition: No AI-specific issues found
        next: reviewers
      - condition: AI-specific issues detected
        next: ai-antipattern-fix
    output_contracts:
      report:
        - name: ai-antipattern-review.md
          format: ai-antipattern-review
  - name: ai-antipattern-fix
    tags:
      - coding
    edit: true
    persona: coder
    policy:
      - coding
      - testing
      - design-fidelity
      - screen-api
    session: refresh
    knowledge:
      - frontend
      - backend
      - cqrs-es
      - security
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    instruction: ai-antipattern-fix
    pass_previous_response: false
    rules:
      - condition: AI Reviewer's issues have been fixed
        next: ai-antipattern-review-1st
      - condition: No fix needed (verified target files/spec)
        next: ai-antipattern-no-fix
      - condition: Unable to proceed with fixes
        next: ai-antipattern-no-fix
  - name: ai-antipattern-no-fix
    tags:
      - review
    edit: false
    persona: architecture-reviewer
    policy: review
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
    rules:
      - condition: ai-antipattern-review-1st's findings are valid (fix required)
        next: ai-antipattern-fix
      - condition: ai-antipattern-fix's judgment is valid (no fix needed)
        next: reviewers
    instruction: arbitrate
  - name: reviewers
    tags:
      - review
    parallel:
      - name: cqrs-es-review
        tags:
          - review
        edit: false
        persona: cqrs-es-reviewer
        policy: review
        knowledge:
          - cqrs-es
          - backend
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-cqrs-es
        output_contracts:
          report:
            - name: cqrs-es-review.md
              format: cqrs-es-review
      - name: frontend-review
        tags:
          - review
        edit: false
        persona: frontend-reviewer
        policy:
          - review
          - design-fidelity
        knowledge: frontend
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-frontend
        output_contracts:
          report:
            - name: frontend-review.md
              format: frontend-review
      - name: security-review
        tags:
          - review
        edit: false
        persona: security-reviewer
        policy: review
        knowledge: security
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-security
        output_contracts:
          report:
            - name: security-review.md
              format: security-review
      - name: qa-review
        tags:
          - review
        edit: false
        persona: qa-reviewer
        policy:
          - review
          - qa
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-qa
        output_contracts:
          report:
            - name: qa-review.md
              format: qa-review
      - name: ai-antipattern-review-2nd
        tags:
          - review
        edit: false
        persona: ai-antipattern-reviewer
        policy:
          - review
          - ai-antipattern
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        instruction: ai-antipattern-review
        rules:
          - condition: approved
          - condition: needs_fix
        output_contracts:
          report:
            - name: ai-antipattern-review.md
              format: ai-antipattern-review
      - name: coding-review
        tags:
          - review
        edit: false
        persona: coding-reviewer
        policy:
          - review
          - coding
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        instruction: review-coding
        output_contracts:
          report:
            - name: coding-review.md
              format: coding-review
        rules:
          - condition: approved
          - condition: needs_fix
    rules:
      - condition: all("approved")
        next: final-gate
      - condition: any("needs_fix")
        next: fix
  - name: final-gate
    kind: workflow_call
    call: merge-readiness-dual-final-gate
    args:
      merge_readiness_knowledge:
        - frontend
        - backend
        - cqrs-es
        - security
        - architecture
      supervise_knowledge:
        - frontend
        - backend
        - cqrs-es
        - security
        - architecture
    rules:
      - condition: COMPLETE
        next: COMPLETE
      - condition: needs_fix
        next: fix
      - condition: need_replan
        next: plan
      - condition: ABORT
        next: ABORT
  - name: fix
    tags:
      - coding
    edit: true
    persona: coder
    policy:
      - coding
      - testing
      - design-fidelity
      - screen-api
    knowledge:
      - frontend
      - backend
      - cqrs-es
      - security
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    pass_previous_response: false
    rules:
      - condition: Fix complete
        next: reviewers
      - condition: Cannot proceed, insufficient info
        next: plan
    instruction: fix
