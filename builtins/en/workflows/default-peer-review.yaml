name: default-peer-review
description: default series Phase 2. Specialist parallel reviewers (arch + ai-antipattern-2nd + coding-review) ⇄ fix loop, followed by merge-readiness review and then supervision.
subworkflow:
  callable: true
  visibility: internal
  returns:
    - need_replan
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 30
initial_step: reviewers
loop_monitors:
  - cycle:
      - reviewers
      - final-gate
      - fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-reviewers-fix
      rules:
        - condition: Healthy (findings decreasing, fixes applied)
          next: reviewers
        - condition: Unproductive (same findings repeating)
          next: ABORT
steps:
  - name: reviewers
    tags:
      - review
    parallel:
      - name: arch-review
        tags:
          - review
        edit: false
        persona: architecture-reviewer
        policy: review
        knowledge: architecture
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-arch
        output_contracts:
          report:
            - name: architect-review.md
              format: architecture-review
      - name: ai-antipattern-review-2nd
        tags:
          - review
        edit: false
        persona: ai-antipattern-reviewer
        policy:
          - review
          - ai-antipattern
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        instruction: ai-antipattern-review
        rules:
          - condition: No AI-specific issues
          - condition: AI-specific issues found
        output_contracts:
          report:
            - name: ai-antipattern-review.md
              format: ai-antipattern-review
      - name: coding-review
        tags:
          - review
        edit: false
        persona: coding-reviewer
        policy:
          - review
          - coding
        pass_previous_response: false
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        instruction: review-coding
        rules:
          - condition: approved
          - condition: needs_fix
        output_contracts:
          report:
            - name: coding-review.md
              format: coding-review
    rules:
      - condition: all("approved", "No AI-specific issues", "approved")
        next: final-gate
      - condition: any("needs_fix", "AI-specific issues found")
        next: fix
  - name: final-gate
    kind: workflow_call
    call: merge-readiness-final-gate
    rules:
      - condition: COMPLETE
        next: COMPLETE
      - condition: needs_fix
        next: fix
      - condition: need_replan
        return: need_replan
      - condition: ABORT
        next: ABORT
  - name: fix
    tags:
      - coding
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    knowledge:
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction: fix
    pass_previous_response: false
    rules:
      - condition: Fix complete
        next: reviewers
      - condition: Cannot proceed, insufficient info
        return: need_replan
