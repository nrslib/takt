name: draft
description: takt-default Phase 1. Implement -> AI-antipattern self-review ⇄ fix loop.
subworkflow:
  callable: true
  visibility: internal
  returns:
    - need_replan
  params:
    impl_knowledge:
      type: facet_ref[]
      facet_kind: knowledge
      default:
        - takt
        - architecture
        - task-decomposition
    fix_knowledge:
      type: facet_ref[]
      facet_kind: knowledge
      default:
        - takt
        - architecture
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 30
initial_step: implement
loop_monitors:
  - cycle:
      - ai-antipattern-review-1st
      - ai-antipattern-fix
    threshold: 5
    judge:
      persona: supervisor
      instruction: loop-monitor-ai-antipattern-fix
      rules:
        - condition: Healthy (making progress)
          next: ai-antipattern-review-1st
        - condition: Unproductive (no improvement)
          next: COMPLETE
steps:
  - name: implement
    tags:
      - leader
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    session: refresh
    knowledge:
      $param: impl_knowledge
    provider_options:
      extends: edit
    required_permission_mode: edit
    team_leader:
      max_parts: 2
      part_tags:
        - coding
      part_persona: coder
      part_edit: true
      part_permission_mode: edit
      part_allowed_tools:
        - Read
        - Glob
        - Grep
        - Edit
        - Write
        - Bash
        - WebSearch
        - WebFetch
    instruction: team-leader-implement
    rules:
      - condition: Implementation complete
        next: ai-antipattern-review-1st
      - condition: No implementation (report only)
        next: ai-antipattern-review-1st
      - condition: Cannot proceed, insufficient info
        return: need_replan
      - condition: User input required
        next: implement
        requires_user_input: true
        interactive_only: true
    output_contracts:
      report:
        - name: coder-scope.md
          format: coder-scope
        - name: coder-decisions.md
          format: coder-decisions
  - name: ai-antipattern-review-1st
    tags:
      - review
    edit: false
    persona: ai-antipattern-reviewer
    policy:
      - review
      - ai-antipattern
    provider_options:
      extends: review-web
    rules:
      - condition: No AI-specific issues
        next: COMPLETE
      - condition: AI-specific issues found
        next: ai-antipattern-fix
    instruction: ai-antipattern-review
    output_contracts:
      report:
        - name: ai-antipattern-review.md
          format: ai-antipattern-review
  - name: ai-antipattern-fix
    tags:
      - coding
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    session: refresh
    knowledge:
      $param: fix_knowledge
    provider_options:
      extends: edit
    required_permission_mode: edit
    pass_previous_response: false
    rules:
      - condition: AI issues fixed
        next: ai-antipattern-review-1st
      - condition: No fix needed (verified target files/spec)
        next: ai-antipattern-no-fix
      - condition: Cannot proceed, insufficient info
        next: ai-antipattern-no-fix
    instruction: ai-antipattern-fix
  - name: ai-antipattern-no-fix
    tags:
      - review
    edit: false
    persona: architecture-reviewer
    policy: review
    provider_options:
      extends: review-files
    rules:
      - condition: ai-antipattern-review-1st's findings are valid (fix required)
        next: ai-antipattern-fix
      - condition: ai-antipattern-fix's judgment is valid (no fix needed)
        next: COMPLETE
    instruction: arbitrate
