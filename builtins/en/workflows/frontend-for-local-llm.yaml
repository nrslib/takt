name: frontend-for-local-llm
description: Frontend development workflow for local LLMs. Four parallel specialist reviewers plus the Finding Contract build discipline for weak models structurally
finding_contract:
  ledger_path: .takt/findings/frontend-for-local-llm.json
  raw_findings_path: .takt/findings/frontend-for-local-llm/raw
  manager:
    persona: findings-manager
    instruction: findings-manager
    output_contract: findings-manager
max_steps: 50
initial_step: plan
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true

loop_monitors:
  - cycle: [replan, implement]
    threshold: 2
    judge:
      persona: supervisor
      instruction: loop-monitor-fix-replan
      rules:
        - condition: The implementation approach can be redefined without changing requirements or acceptance criteria
          next: replan
        - condition: No feasible approach can satisfy the requirements even after considering the attempted replans
          next: ABORT
  - cycle:
      - ai-antipattern-review-1st
      - ai-antipattern-fix
    threshold: 5
    judge:
      persona: supervisor
      instruction: loop-monitor-ai-antipattern-fix-1st
      rules:
        - condition: Healthy (making progress)
          next: ai-antipattern-review-1st
        - condition: Unproductive (no improvement)
          next: reviewers
  - cycle:
      - ai-antipattern-fix
      - ai-antipattern-no-fix
    threshold: 5
    judge:
      persona: supervisor
      instruction: loop-monitor-ai-antipattern-fix-1st
      rules:
        - condition: Healthy (making progress)
          next: ai-antipattern-review-1st
        - condition: Unproductive (no improvement)
          next: reviewers
  - cycle: [replan, implement, ai-antipattern-review-1st, reviewers]
    threshold: 2
    judge:
      persona: supervisor
      instruction: loop-monitor-fix-replan
      rules:
        - condition: The implementation approach can be redefined without changing requirements or acceptance criteria
          next: replan
        - condition: No feasible approach can satisfy the requirements even after considering the attempted replans
          next: ABORT
  - cycle: [replan, implement, ai-antipattern-review-1st, reviewers, final-gate]
    threshold: 2
    judge:
      persona: supervisor
      instruction: loop-monitor-fix-replan
      rules:
        - condition: The implementation approach can be redefined without changing requirements or acceptance criteria
          next: replan
        - condition: No feasible approach can satisfy the requirements even after considering the attempted replans
          next: ABORT
  - cycle:
      - replan
      - implement
      - ai-antipattern-review-1st
      - reviewers
      - fix
    threshold: 2
    judge:
      persona: supervisor
      instruction: loop-monitor-fix-replan
      rules:
        - condition: Healthy (each replan moves the blocker toward resolution)
          next: replan
        - condition: No feasible approach can satisfy the requirements even after considering the attempted replans
          next: ABORT
  - cycle:
      - fix
      - reviewers
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-reviewers-fix-fc
      rules:
        - condition: The post-fix review confirms progress and the next fix is actionable
          next: fix
        - condition: unproductive (the same findings repeat), but replanning could break the deadlock
          next: replan
        - condition: No feasible approach can satisfy the requirements even after considering the attempted replans
          next: ABORT
  - cycle: [fix, reviewers, final-gate]
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-reviewers-fix-fc
      rules:
        - condition: The post-fix review confirms progress and the next fix is actionable
          next: fix
        - condition: unproductive (the same findings repeat), but replanning could break the deadlock
          next: replan
        - condition: No feasible approach can satisfy the requirements even after considering the attempted replans
          next: ABORT
steps:
  - name: plan
    tags:
      - plan
    edit: false
    persona: planner
    knowledge:
      - frontend
      - react
      - architecture
    provider_options:
      extends: review-readonly
    instruction: plan
    rules:
      - condition: Task analysis and planning is complete
        next: write_tests
      - condition: The user is asking a question (not an implementation task)
        next: COMPLETE
      - condition: Requirements are unclear and planning cannot proceed
        next: ABORT
    output_contracts:
      report:
        - name: plan.md
          format: plan-frontend

  - name: replan
    tags:
      - plan
    edit: false
    persona: planner
    knowledge:
      - frontend
      - react
      - architecture
    provider_options:
      extends: review-readonly
    instruction: replan-implementation
    rules:
      - condition: The implementation approach was successfully redefined
        next: implement
      - condition: No feasible approach can satisfy the requirements
        next: ABORT
    output_contracts:
      report:
        - name: plan.md
          format: plan-frontend

  - name: write_tests
    tags:
      - coding
      - test-planning
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    knowledge:
      - frontend
      - react
      - architecture
      - unit-testing
      - e2e-testing
      - implementation-semantics
    provider_options:
      extends: edit
    required_permission_mode: edit
    instruction: write-tests-first
    rules:
      - condition: Test creation is complete
        next: implement
      - condition: Skipping test creation as target is not yet implemented
        next: implement
      - condition: Cannot proceed with test creation
        next: plan
      - condition: User input required for clarification
        next: write_tests
        requires_user_input: true
        interactive_only: true
    output_contracts:
      report:
        - name: test-report.md
          format: test-report

  - name: implement
    tags:
      - coding
    edit: true
    persona: coder
    policy:
      - coding
    knowledge:
      - frontend
      - react
      - architecture
      - implementation-semantics
    provider_options:
      extends: edit
    required_permission_mode: edit
    instruction: implement
    rules:
      - condition: Implementation is complete
        next: ai-antipattern-review-1st
      - condition: Cannot proceed with implementation (environment issue or missing information)
        next: replan

  # Same step as frontend.yaml. Clears AI-specific issues right after
  # implementation, before the perspective reviewers run. Weak models need this.
  - name: ai-antipattern-review-1st
    session_key: ai-antipattern-review-1st
    tags:
      - review
    edit: false
    persona: ai-antipattern-reviewer
    policy:
      - review
      - ai-antipattern
    provider_options:
      extends: review-readonly
    instruction: ai-antipattern-review-for-local-llm
    rules:
      - condition: No AI-specific issues
        next: reviewers
      - condition: AI-specific issues found
        next: ai-antipattern-fix
    output_contracts:
      report:
        - name: ai-antipattern-review-1st.md
          format: ai-antipattern-review-finding-contract

  - name: ai-antipattern-fix
    tags:
      - coding
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    session: refresh
    knowledge:
      - frontend
      - react
      - architecture
    provider_options:
      extends: edit
    required_permission_mode: edit
    pass_previous_response: false
    instruction: ai-antipattern-fix
    rules:
      - condition: AI issues fixed
        next: ai-antipattern-review-1st
      - condition: No fix needed (verified target files/spec)
        next: ai-antipattern-no-fix
      - condition: Cannot proceed, insufficient info
        next: ai-antipattern-no-fix

  - name: ai-antipattern-no-fix
    tags:
      - review
    edit: false
    persona: architecture-reviewer-for-local-llm
    policy: review
    provider_options:
      extends: review-files
    instruction: arbitrate-review-1st
    rules:
      - condition: ai-antipattern-review-1st's findings are valid (fix required)
        next: ai-antipattern-fix
      - condition: ai-antipattern-fix's judgment is valid (no fix needed)
        next: reviewers

  - name: reviewers
    tags:
      - review
    parallel:
      - name: frontend-review
        tags:
          - review
        edit: false
        persona: frontend-reviewer
        policy:
          - review
        knowledge:
          - frontend
          - react
        instruction: review-frontend
        rules:
          - condition: approved
          - condition: needs_fix
        output_contracts:
          report:
            - name: frontend-review.md
              format: frontend-review-finding-contract

      - name: ai-antipattern-review
        session_key: ai-antipattern-review-finding-contract
        tags:
          - review
        edit: false
        persona: ai-antipattern-reviewer
        policy:
          - review
          - ai-antipattern
        pass_previous_response: false
        instruction: ai-antipattern-review-for-local-llm
        rules:
          - condition: No AI-specific issues
          - condition: AI-specific issues found
        output_contracts:
          report:
            - name: ai-antipattern-review.md
              format: ai-antipattern-review-finding-contract

      - name: coding-review
        tags:
          - review
        edit: false
        persona: coding-reviewer
        policy:
          - review
          - coding
        pass_previous_response: false
        instruction: review-coding-for-local-llm
        rules:
          - condition: approved
          - condition: needs_fix
        output_contracts:
          report:
            - name: coding-review.md
              format: coding-review-finding-contract

      - name: implementation-semantics-review
        tags:
          - review
        edit: false
        persona: implementation-semantics-reviewer
        policy:
          - review
        knowledge:
          - implementation-semantics
        pass_previous_response: false
        instruction: review-implementation-semantics-for-local-llm
        rules:
          - condition: approved
          - condition: needs_fix
        output_contracts:
          report:
            - name: implementation-semantics-review.md
              format: implementation-semantics-review-finding-contract
    rules:
      - condition: all("approved", "No AI-specific issues", "approved", "approved") && when(findings.open.count == 0 && findings.conflicts.count == 0)
        next: final-gate
      # If provisional findings reached a semantic fixpoint since the previous
      # round (no meaningful change), route through a requirements-preserving
      # replan (convergence batch B1) and let the loop monitor bound repetition.
      # Review-integrity gate (codex 対策#4 / verification blocker #1): if the product
      # gate is clear (no open findings) but unpromoted reviewer anomalies remain, hand
      # to final-gate — which re-reviews up to the review-integrity budget, then
      # routes to replan — instead of falling through to the fix rules below. There is
      # nothing to fix (the observations were isolated as unverifiable), and an anomaly
      # must be sent to re-review, never to fix.
      - condition: when(findings.open.count == 0 && findings.conflicts.count == 0 && findings.reviewerAnomalies.count > 0)
        next: final-gate
      - condition: when(findings.provisional.fixpoint == true && findings.conflicts.count == 0)
        next: replan
      # If the cumulative findings-manager round count (or elapsed time, when
      # configured) exceeds finding_contract.stop_budget, the provisional set
      # may still be churning (never reaching a fixpoint). Route it through a
      # requirements-preserving replan and bound repetition with the loop monitor.
      - condition: when(findings.rounds.budgetExhausted == true && findings.provisional.count > 0 && findings.conflicts.count == 0)
        next: replan
      # Provisional findings (observations whose meaning could not be determined)
      # are system findings the fixer cannot address directly; replan instead of
      # looping the fixer (raw-finding ladder design v2).
      - condition: when(findings.provisional.count > 0 && findings.conflicts.count == 0)
        next: replan
      - condition: any("needs_fix", "AI-specific issues found") && when(findings.conflicts.count == 0)
        next: fix
      - condition: when(findings.conflicts.count == 0 && findings.open.count > 0)
        next: fix
      - condition: when(findings.conflicts.count > 0 && findings.conflicts.unadjudicated.count > 0)
        next: finding-conflict-adjudication
      - condition: when(findings.conflicts.count > 0)
        next: ABORT

  # Keep merge-readiness review and supervision sequential inside the FC-aware final gate.
  # The child workflow inherits this workflow's Finding Contract and shared ledger.
  - name: final-gate
    kind: workflow_call
    call: merge-readiness-finding-contract-final-gate-for-local-llm
    args:
      supervise_knowledge:
        - frontend
        - react
        - architecture
    rules:
      - condition: COMPLETE
        next: COMPLETE
      - condition: needs_review
        next: reviewers
      - condition: need_replan
        next: replan
      - condition: needs_fix
        next: fix
      - condition: needs_conflict_adjudication
        next: finding-conflict-adjudication
      - condition: ABORT
        next: ABORT

  - name: fix
    tags:
      - coding
    edit: true
    persona: coder
    policy:
      - coding
    knowledge:
      - frontend
      - react
      - architecture
      - implementation-semantics
    provider_options:
      extends: edit
    required_permission_mode: edit
    instruction: fix
    rules:
      - condition: Fixes are complete
        next: reviewers
      - condition: Cannot proceed with fixes, or the implementation approach must be redefined
        next: replan
        appendix: |
          The fix attempt is stuck. Read the rejection details and the stated
          blocker, decompose the work again, and replan. Declare planning
          impossible only when no feasible approach can satisfy the requirements,
          with the blocking constraints stated explicitly.
