name: takt-default-for-local-llm
description: TAKT development workflow for local LLMs. Same flow as takt-default (plan -> tests -> implement + AI self-review -> parallel specialist review <-> fix -> sequential final gate), built with six parallel reviewers plus the Finding Contract (ledger, resolution confirmations, dispute adjudication) to give weak models structural discipline
finding_contract:
  ledger_path: .takt/findings/takt-default-for-local-llm.json
  raw_findings_path: .takt/findings/takt-default-for-local-llm/raw
  manager:
    persona: findings-manager
    instruction: findings-manager
    output_contract: findings-manager
max_steps: 50
initial_step: plan
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true

loop_monitors:
  - cycle:
      - ai-antipattern-review-1st
      - ai-antipattern-fix
    threshold: 5
    judge:
      persona: supervisor
      instruction: loop-monitor-ai-antipattern-fix-1st
      rules:
        - condition: Healthy (making progress)
          next: ai-antipattern-review-1st
        - condition: Unproductive (no improvement)
          next: reviewers
  - cycle:
      - ai-antipattern-fix
      - ai-antipattern-no-fix
    threshold: 5
    judge:
      persona: supervisor
      instruction: loop-monitor-ai-antipattern-fix-1st
      rules:
        - condition: Healthy (making progress)
          next: ai-antipattern-review-1st
        - condition: Unproductive (no improvement)
          next: reviewers
  - cycle:
      - plan
      - write_tests
      - implement
      - reviewers
      - fix
    threshold: 2
    judge:
      persona: supervisor
      instruction: loop-monitor-fix-replan
      rules:
        - condition: The latest fix ended with fixes complete (not a dead end)
          next: reviewers
        - condition: Healthy (each replan moves the blocker toward resolution)
          next: plan
        - condition: Unproductive (the same dead end repeats)
          next: ABORT
  - cycle:
      - reviewers
      - fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-reviewers-fix
      rules:
        - condition: converging (findings decreasing, fixes applied)
          next: reviewers
        - condition: unproductive (the same findings repeat), but replanning could break the deadlock
          next: plan
        - condition: unproductive (the same findings repeat), and replanning is unlikely to help
          next: ABORT
  - cycle: [reviewers, final-gate, fix]
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-reviewers-fix
      rules:
        - condition: converging (findings decreasing, fixes applied)
          next: reviewers
        - condition: unproductive (the same findings repeat), but replanning could break the deadlock
          next: plan
        - condition: unproductive (the same findings repeat), and replanning is unlikely to help
          next: ABORT
steps:
  - name: plan
    tags:
      - plan
    edit: false
    persona: planner
    knowledge:
      - architecture
    provider_options:
      extends: review-readonly
    instruction: plan
    rules:
      - condition: Task analysis and planning is complete
        next: write_tests
      - condition: The user is asking a question (not an implementation task)
        next: COMPLETE
      - condition: Requirements are unclear and planning cannot proceed
        next: ABORT
    output_contracts:
      report:
        - name: plan.md
          format: plan

  - name: write_tests
    tags:
      - coding
      - test-planning
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    knowledge:
      - takt
      - architecture
      - unit-testing
      - e2e-testing
      - implementation-semantics
    provider_options:
      extends: edit
    required_permission_mode: edit
    instruction: write-tests-first
    rules:
      - condition: Test creation is complete
        next: implement
      - condition: Skipping test creation as target is not yet implemented
        next: implement
      - condition: Cannot proceed with test creation
        next: plan
      - condition: User input required for clarification
        next: write_tests
        requires_user_input: true
        interactive_only: true
    output_contracts:
      report:
        - name: test-report.md
          format: test-report

  - name: implement
    tags:
      - leader
    edit: true
    persona: coder
    policy:
      - coding
    knowledge:
      - takt
      - architecture
      - implementation-semantics
    provider_options:
      extends: edit
    required_permission_mode: edit
    pass_previous_response: true
    team_leader:
      max_concurrency: 1
      initial_max_parts: 1
      max_total_parts: 6
      fail_on_part_error: false
      part_tags:
        - coding
      part_persona: coder
      part_edit: true
      part_permission_mode: edit
      part_allowed_tools:
        - Read
        - Glob
        - Grep
        - Edit
        - Write
        - Bash
        - WebSearch
        - WebFetch
    instruction: team-leader-implement
    rules:
      - condition: Implementation is complete
        next: ai-antipattern-review-1st
      - condition: Cannot proceed with implementation (environment issue or missing information)
        next: plan

  # Mirrors takt-default's draft phase: clear AI-specific issues right after
  # implementation, before the perspective reviewers run. Weak models need this.
  - name: ai-antipattern-review-1st
    session_key: ai-antipattern-review-1st
    tags:
      - review
    edit: false
    persona: ai-antipattern-reviewer
    policy:
      - review
      - ai-antipattern
    provider_options:
      extends: review-readonly
    instruction: ai-antipattern-review-for-local-llm
    rules:
      - condition: No AI-specific issues
        next: reviewers
      - condition: AI-specific issues found
        next: ai-antipattern-fix
    output_contracts:
      report:
        - name: ai-antipattern-review-1st.md
          format: ai-antipattern-review-finding-contract

  - name: ai-antipattern-fix
    tags:
      - leader
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    knowledge:
      - takt
      - architecture
    provider_options:
      extends: edit
    required_permission_mode: edit
    pass_previous_response: true
    team_leader:
      max_concurrency: 1
      initial_max_parts: 1
      max_total_parts: 6
      fail_on_part_error: false
      part_tags:
        - coding
      part_persona: coder
      part_edit: true
      part_permission_mode: edit
      part_allowed_tools:
        - Read
        - Glob
        - Grep
        - Edit
        - Write
        - Bash
        - WebSearch
        - WebFetch
    instruction: team-leader-ai-antipattern-fix
    rules:
      - condition: AI issues fixed
        next: ai-antipattern-review-1st
      - condition: No fix needed (verified target files/spec)
        next: ai-antipattern-no-fix
      - condition: Cannot proceed, insufficient info
        next: ai-antipattern-no-fix

  - name: ai-antipattern-no-fix
    tags:
      - review
    edit: false
    persona: architecture-reviewer-for-local-llm
    policy: review
    provider_options:
      extends: review-files
    instruction: arbitrate-review-1st
    rules:
      - condition: ai-antipattern-review-1st's findings are valid (fix required)
        next: ai-antipattern-fix
      - condition: ai-antipattern-fix's judgment is valid (no fix needed)
        next: reviewers

  - name: reviewers
    tags:
      - review
    parallel:
      - name: arch-review
        tags:
          - review
        edit: false
        session: refresh
        persona: architecture-reviewer-for-local-llm
        policy:
          - review
        knowledge:
          - architecture
        instruction: review-arch-for-local-llm
        rules:
          - condition: approved
          - condition: needs_fix
        output_contracts:
          report:
            - name: architect-review.md
              format: architecture-review-finding-contract

      - name: ai-antipattern-review
        session_key: ai-antipattern-review-finding-contract
        tags:
          - review
        edit: false
        session: refresh
        persona: ai-antipattern-reviewer
        policy:
          - review
          - ai-antipattern
        pass_previous_response: false
        instruction: ai-antipattern-review-for-local-llm
        rules:
          - condition: No AI-specific issues
          - condition: AI-specific issues found
        output_contracts:
          report:
            - name: ai-antipattern-review.md
              format: ai-antipattern-review-finding-contract

      - name: coding-review
        tags:
          - review
        edit: false
        session: refresh
        persona: coding-reviewer
        policy:
          - review
          - coding
        pass_previous_response: false
        instruction: review-coding-for-local-llm
        rules:
          - condition: approved
          - condition: needs_fix
        output_contracts:
          report:
            - name: coding-review.md
              format: coding-review-finding-contract

      - name: implementation-semantics-review
        tags:
          - review
        edit: false
        session: refresh
        persona: implementation-semantics-reviewer
        policy:
          - review
        knowledge:
          - implementation-semantics
        pass_previous_response: false
        instruction: review-implementation-semantics-for-local-llm
        rules:
          - condition: approved
          - condition: needs_fix
        output_contracts:
          report:
            - name: implementation-semantics-review.md
              format: implementation-semantics-review-finding-contract

      - name: contract-lifecycle-review
        tags:
          - review
        edit: false
        session: refresh
        persona: contract-lifecycle-reviewer
        policy:
          - review
        knowledge:
          - contract-lifecycle
        pass_previous_response: false
        instruction: contract-lifecycle-review-for-local-llm
        rules:
          - condition: approved
          - condition: needs_fix
        output_contracts:
          report:
            - name: contract-lifecycle-review.md
              format: contract-lifecycle-review-finding-contract

      - name: robustness-review
        tags:
          - review
        edit: false
        session: refresh
        persona: robustness-reviewer
        policy:
          - review
        knowledge:
          - robustness
        pass_previous_response: false
        instruction: robustness-review-for-local-llm
        rules:
          - condition: approved
          - condition: needs_fix
        output_contracts:
          report:
            - name: robustness-review.md
              format: robustness-review-finding-contract
    rules:
      - condition: all("approved", "No AI-specific issues", "approved", "approved", "approved", "approved") && when(findings.open.count == 0 && findings.conflicts.count == 0)
        next: final-gate
      # If provisional findings reached a semantic fixpoint since the previous
      # round (no meaningful change), replanning cannot resolve them either
      # (convergence batch B1). Route to the human-adjudication terminal state
      # before falling back to the replan rule below.
      # Review-integrity gate (codex 対策#4 / verification blocker #1): if the product
      # gate is clear (no open findings) but unpromoted reviewer anomalies remain, hand
      # to final-gate — which re-reviews up to the review-integrity budget, then
      # adjudicates — instead of falling through to the fix rules below. There is
      # nothing to fix (the observations were isolated as unverifiable), and an anomaly
      # must be sent to re-review, never to fix.
      - condition: any("approved", "needs_fix", "No AI-specific issues", "AI-specific issues found") && when(findings.open.count == 0 && findings.conflicts.count == 0 && findings.reviewerAnomalies.count > 0)
        next: final-gate
      - condition: when(findings.provisional.fixpoint == true && findings.conflicts.count == 0)
        next: NEEDS_ADJUDICATION
      # If the cumulative findings-manager round count (or elapsed time, when
      # configured) exceeds finding_contract.stop_budget, the provisional set
      # may still be churning (never reaching a fixpoint) — route to the same
      # human-adjudication terminal state instead of replanning forever
      # (bounded stop budget, codex-adjudicated extension of convergence batch B1).
      - condition: when(findings.rounds.budgetExhausted == true && findings.conflicts.count == 0)
        next: NEEDS_ADJUDICATION
      # Provisional findings (observations whose meaning could not be determined)
      # are system findings the fixer cannot address directly; replan instead of
      # looping the fixer (raw-finding ladder design v2).
      - condition: when(findings.provisional.count > 0 && findings.conflicts.count == 0)
        next: plan
      - condition: any("needs_fix", "AI-specific issues found") && when(findings.conflicts.count == 0)
        next: fix
      - condition: when(findings.conflicts.count == 0 && findings.open.count > 0)
        next: fix
      - condition: when(findings.conflicts.count > 0 && findings.conflicts.unadjudicated.count > 0)
        next: finding-conflict-adjudication
      - condition: when(findings.conflicts.count > 0)
        next: ABORT

  # Keep merge-readiness review and supervision sequential inside the FC-aware final gate.
  # The child workflow inherits this workflow's Finding Contract and shared ledger.
  - name: final-gate
    kind: workflow_call
    call: merge-readiness-finding-contract-final-gate-for-local-llm
    args:
      supervise_knowledge:
        - architecture
        - takt
    rules:
      - condition: COMPLETE
        next: COMPLETE
      - condition: needs_review
        next: reviewers
      - condition: need_replan
        next: plan
      - condition: needs_fix
        next: fix
      - condition: needs_conflict_adjudication
        next: finding-conflict-adjudication
      - condition: ABORT
        next: ABORT

  - name: fix
    tags:
      - leader
    edit: true
    persona: coder
    policy:
      - coding
    knowledge:
      - takt
      - architecture
      - implementation-semantics
    provider_options:
      extends: edit
    required_permission_mode: edit
    team_leader:
      max_concurrency: 1
      initial_max_parts: 1
      max_total_parts: 6
      fail_on_part_error: false
      part_tags:
        - coding
      part_persona: coder
      part_edit: true
      part_permission_mode: edit
      part_allowed_tools:
        - Read
        - Glob
        - Grep
        - Edit
        - Write
        - Bash
        - WebSearch
        - WebFetch
    instruction: team-leader-fix
    rules:
      - condition: Fixes are complete
        next: reviewers
      - condition: Cannot proceed with fixes, or human judgment is required
        next: plan
        appendix: |
          The fix attempt is stuck. Read the rejection details and the stated
          blocker, decompose the work again, and replan. Declare planning
          impossible only if human judgment is genuinely required, with the
          reasons stated explicitly.
