name: review-fix-takt-default
description: TAKT-focused development workflow with review-target gathering (gather -> plan -> write_tests -> draft (implement + AI self-review) -> peer-review (specialist review + fix + parallel final gate) -> COMPLETE).
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 50
initial_step: gather
loop_monitors:
  - cycle:
      - plan
      - write_tests
      - draft
      - peer-review
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-replan
      rules:
        - condition: Healthy (plan refined, implementation converging)
          next: plan
        - condition: Unproductive (same replan reason repeating)
          next: ABORT
steps:
  - name: gather
    tags:
      - plan
    edit: false
    persona: planner
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    instruction: gather-review
    output_contracts:
      report:
        - name: review-target.md
          format: review-gather
    rules:
      - condition: Review target information gathered
        next: plan
      - condition: Cannot identify review target, insufficient info
        next: ABORT
        appendix: |
          Clarifications needed:
          - {Question 1}
          - {Question 2}
  - name: plan
    tags:
      - plan
    edit: false
    persona: planner
    knowledge: architecture
    provider_options:
      extends: review-readonly
    rules:
      - condition: Requirements are clear and implementable
        next: write_tests
      - condition: User is asking a question (not an implementation task)
        next: COMPLETE
      - condition: Requirements unclear, insufficient info
        next: ABORT
        appendix: |
          Items to confirm:
          - {question 1}
          - {question 2}
    instruction: plan
    output_contracts:
      report:
        - name: plan.md
          format: plan
  - name: write_tests
    tags:
      - coding
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    knowledge:
      - takt
      - architecture
      - unit-testing
      - e2e-testing
    provider_options:
      extends: edit
    required_permission_mode: edit
    instruction: write-tests-first
    rules:
      - condition: Tests written
        next: draft
      - condition: Skip test writing because target is not yet implemented
        next: draft
      - condition: Cannot proceed with writing tests
        next: plan
      - condition: User input required for confirmation
        next: write_tests
        requires_user_input: true
        interactive_only: true
    output_contracts:
      report:
        - name: test-report.md
          format: test-report
  - name: draft
    kind: workflow_call
    call: draft
    rules:
      - condition: COMPLETE
        next: peer-review
      - condition: need_replan
        next: plan
      - condition: ABORT
        next: ABORT
  - name: peer-review
    kind: workflow_call
    call: peer-review
    rules:
      - condition: COMPLETE
        next: COMPLETE
      - condition: need_replan
        next: plan
      - condition: ABORT
        next: ABORT
