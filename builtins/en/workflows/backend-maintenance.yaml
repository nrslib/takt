name: backend-maintenance
description: Strict backend maintenance workflow for existing production systems
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 60
initial_step: plan
loop_monitors:
  - cycle:
      - ai-antipattern-review-1st
      - ai-antipattern-fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-ai-antipattern-fix
      rules:
        - condition: Healthy (making progress)
          next: ai-antipattern-review-1st
        - condition: Unproductive (no improvement)
          next: reviewers_1
  - cycle:
      - reviewers_1
      - final-gate
      - fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-reviewers-fix
      rules:
        - condition: converging (findings decreasing, fixes applied)
          next: reviewers_1
        - condition: unproductive (same findings repeating)
          next: final-gate
steps:
  - name: plan
    tags:
      - plan
    edit: false
    persona: planner
    policy:
      - existing-system-respect
    knowledge:
      - backend
      - architecture
      - existing-system
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    instruction: plan-maintenance
    rules:
      - condition: Task analysis and planning is complete
        next: write_tests
      - condition: Requirements are unclear and planning cannot proceed
        next: ABORT
    output_contracts:
      report:
        - name: plan.md
          format: plan
  - name: write_tests
    tags:
      - coding
    edit: true
    persona: coder
    policy:
      - coding
      - testing
      - existing-system-respect
    knowledge:
      - backend
      - architecture
      - unit-testing
      - e2e-testing
      - existing-system
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction: write-tests-maintenance
    rules:
      - condition: Test creation is complete
        next: implement
      - condition: Skipping test creation as target is not yet implemented
        next: implement
      - condition: Cannot proceed with test creation
        next: plan
      - condition: User input required for clarification
        next: write_tests
        requires_user_input: true
        interactive_only: true
    output_contracts:
      report:
        - name: test-report.md
          format: test-report
  - name: implement
    tags:
      - coding
    edit: true
    persona: coder
    policy:
      - coding
      - testing
      - existing-system-respect
    session: refresh
    knowledge:
      - backend
      - security
      - architecture
      - existing-system
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    instruction: implement-maintenance
    rules:
      - condition: Implementation is complete
        next: ai-antipattern-review-1st
      - condition: No implementation (report only)
        next: ai-antipattern-review-1st
      - condition: Cannot proceed with implementation
        next: ai-antipattern-review-1st
      - condition: User input required
        next: implement
        requires_user_input: true
        interactive_only: true
    output_contracts:
      report:
        - name: maintenance-scope.md
          format: maintenance-scope
        - name: coder-decisions.md
          format: coder-decisions
  - name: ai-antipattern-review-1st
    tags:
      - review
    edit: false
    persona: ai-antipattern-reviewer
    policy:
      - review
      - ai-antipattern
      - existing-system-respect
    knowledge:
      - existing-system
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    instruction: ai-antipattern-review
    rules:
      - condition: No AI-specific issues found
        next: reviewers_1
      - condition: AI-specific issues detected
        next: ai-antipattern-fix
    output_contracts:
      report:
        - name: ai-antipattern-review.md
          format: ai-antipattern-review
  - name: ai-antipattern-fix
    tags:
      - coding
    edit: true
    persona: coder
    policy:
      - coding
      - testing
      - existing-system-respect
    session: refresh
    knowledge:
      - backend
      - security
      - architecture
      - existing-system
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    instruction: ai-antipattern-fix
    pass_previous_response: false
    rules:
      - condition: AI Reviewer's issues have been fixed
        next: ai-antipattern-review-1st
      - condition: No fix needed (verified target files/spec)
        next: ai-antipattern-no-fix
      - condition: Unable to proceed with fixes
        next: ai-antipattern-no-fix
  - name: ai-antipattern-no-fix
    tags:
      - review
    edit: false
    persona: architecture-reviewer
    policy:
      - review
      - existing-system-respect
    knowledge:
      - existing-system
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
    rules:
      - condition: ai-antipattern-review-1st's findings are valid (fix required)
        next: ai-antipattern-fix
      - condition: ai-antipattern-fix's judgment is valid (no fix needed)
        next: reviewers_1
    instruction: arbitrate
  - name: reviewers_1
    tags:
      - review
    parallel:
      - name: arch-review
        tags:
          - review
        edit: false
        persona: architecture-reviewer
        policy:
          - review
          - existing-system-respect
        knowledge:
          - architecture
          - backend
          - existing-system
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-arch
        output_contracts:
          report:
            - name: architect-review.md
              format: architecture-review
      - name: testing-review
        tags:
          - review
        edit: false
        persona: testing-reviewer
        policy:
          - review
          - testing
          - existing-system-respect
        knowledge:
          - unit-testing
          - e2e-testing
          - existing-system
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-test
        output_contracts:
          report:
            - name: testing-review.md
              format: testing-review
      - name: ai-antipattern-review-2nd
        tags:
          - review
        edit: false
        persona: ai-antipattern-reviewer
        policy:
          - review
          - ai-antipattern
          - existing-system-respect
        knowledge:
          - existing-system
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        instruction: ai-antipattern-review
        rules:
          - condition: approved
          - condition: needs_fix
        output_contracts:
          report:
            - name: ai-antipattern-review.md
              format: ai-antipattern-review
    rules:
      - condition: all("approved")
        next: reviewers_2
      - condition: any("needs_fix")
        next: fix
  - name: reviewers_2
    tags:
      - review
    parallel:
      - name: security-review
        tags:
          - review
        edit: false
        persona: security-reviewer
        policy:
          - review
          - existing-system-respect
        knowledge:
          - security
          - existing-system
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-security
        output_contracts:
          report:
            - name: security-review.md
              format: security-review
      - name: qa-review
        tags:
          - review
        edit: false
        persona: qa-reviewer
        policy:
          - review
          - qa
          - existing-system-respect
        knowledge:
          - existing-system
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-qa
        output_contracts:
          report:
            - name: qa-review.md
              format: qa-review
      - name: coding-review
        tags:
          - review
        edit: false
        persona: coding-reviewer
        policy:
          - review
          - coding
          - existing-system-respect
        knowledge:
          - existing-system
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        instruction: review-coding
        output_contracts:
          report:
            - name: coding-review.md
              format: coding-review
        rules:
          - condition: approved
          - condition: needs_fix
    rules:
      - condition: all("approved")
        next: final-gate
      - condition: any("needs_fix")
        next: fix
  - name: final-gate
    kind: workflow_call
    call: merge-readiness-dual-final-gate
    args:
      merge_readiness_policy:
        - review
        - existing-system-respect
      merge_readiness_knowledge:
        - backend
        - security
        - architecture
        - existing-system
      supervise_knowledge:
        - backend
        - security
        - architecture
        - existing-system
    rules:
      - condition: COMPLETE
        next: COMPLETE
      - condition: needs_fix
        next: fix
      - condition: need_replan
        next: plan
      - condition: ABORT
        next: ABORT
  - name: fix
    tags:
      - coding
    edit: true
    persona: coder
    policy:
      - coding
      - testing
      - existing-system-respect
    knowledge:
      - backend
      - security
      - architecture
      - existing-system
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    pass_previous_response: false
    rules:
      - condition: Fix complete
        next: reviewers_1
      - condition: Cannot proceed, insufficient info
        next: plan
    instruction: fix-maintenance
