# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
# TAKT facet eval: review-frontend / frontend-review (codex).
# Run via npm run eval:prompts -- frontend

description: 'TAKT facet eval: review-frontend / frontend-review'

prompts:
  - file://prompts/frontend-review.phase1.md

providers:
  - id: openai:codex-sdk
    label: codex
    config:
      working_dir: fixtures/frontend-app
      sandbox_mode: read-only
      approval_policy: never
      skip_git_repo_check: true
      model_reasoning_effort: low

tests:
  - description: 'recall: planted frontend layering violations must be flagged'
    vars:
      task: file://cases/frontend-layering.md
      previous_response: file://cases/prev-gather-frontend.md
    assert:
      - type: javascript
        metric: recall/route-with-logic
        value: |
          return /(user-list|route|ルート)/i.test(output) &&
            /(useState|ロジック|データ取得|薄|thin|view)/i.test(output);
      - type: javascript
        metric: recall/cross-feature-import
        value: |
          return /(order-panel|orders)/i.test(output) &&
            /(users|feature|直接参照|依存)/i.test(output);
      - type: javascript
        metric: recall/shared-depends-on-feature
        value: |
          return /(user-avatar|shared)/i.test(output) &&
            /(feature|依存|参照|逆)/i.test(output);
