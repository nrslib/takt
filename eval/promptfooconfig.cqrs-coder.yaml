# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
# TAKT facet eval: backend-cqrs / implement (coder, codex writes files).
# Runs in the disposable copy eval/.work/cqrs-implement (recreated by
# prepare on every run); scoring inspects the written artifacts.
# Run via npm run eval:prompts -- cqrs-coder

description: 'TAKT facet eval: backend-cqrs / implement (coder)'

prompts:
  - file://prompts/cqrs-implement.phase1.md

providers:
  - id: openai:codex-sdk
    label: codex
    config:
      working_dir: .work/cqrs-implement
      sandbox_mode: workspace-write
      approval_policy: never
      skip_git_repo_check: true
      model_reasoning_effort: low

tests:
  - description: 'coder: withdrawal support implemented per CQRS+ES rules'
    vars:
      task: file://cases/cqrs-implement-task.md
      previous_response: file://cases/prev-plan-cqrs-implement.md
    assert:
      - type: javascript
        metric: coder/cqrs-artifacts
        value: file://asserts/cqrs-implement.mjs
